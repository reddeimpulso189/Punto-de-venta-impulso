// ── Storage (Firebase con fallback localStorage) ───────────────
const LS={
  get:(k,fb)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}},
};

function getCFG(){return LS.get('pvi_cfg',CFG_INIT);}
function setCFG(c){LS.set('pvi_cfg',c);Object.assign(CFG_INIT,c);}
(()=>{const s=getCFG();Object.assign(CFG_INIT,s);})();

function getProds(){return LS.get('pvi_prods',BASE_PRODS.map(p=>({...p})));}
function setProds(p){LS.set('pvi_prods',p);if(fbOk&&db)db.ref('products').set(p.reduce((o,pr)=>{o[pr.barcode]=pr;return o;},{}));}
function getSales(){return LS.get('pvi_sales',[]);}
function setSales(s){LS.set('pvi_sales',s);if(fbOk&&db)db.ref('sales').set(s.reduce((o,sl)=>{o[sl.id]=sl;return o;},{}));}

// Escuchar cambios en tiempo real desde Firebase

function notify(msg,type='ok'){

// ── Productos caducados / próximos a caducar ───────────────────
function getExpiryStatus(p){
  if(!p.expiryDate||!p.expiryDays)return null;
  const today=new Date();const exp=new Date(p.expiryDate);
  const diff=Math.ceil((exp-today)/(1000*60*60*24));
  if(diff<0)return{status:'expired',days:diff,label:'CADUCADO'};
  if(diff<=7)return{status:'soon',days:diff,label:`Caduca en ${diff} día${diff===1?'':'s'}`};
  return{status:'ok',days:diff,label:`Caduca: ${exp.toLocaleDateString('es-MX')}`};
}

function nearExpiry(){
  return S.prods.filter(p=>{
    const st=getExpiryStatus(p);
    return st&&(st.status==='expired'||st.status==='soon');
  });
}

// ── Buscar producto en internet por código de barras ──────────
async function searchProductOnline(barcode){
  S.newP.searchingOnline=true;render();
  try{
    // Open Food Facts API — gratuita, sin key
    const res=await fetch(`https://world.openfoodfacts.org/api/v2/product/${barcode}.json`);
    const data=await res.json();
    if(data.status===1&&data.product){
      const p=data.product;
      const name=p.product_name_es||p.product_name||p.abbreviated_product_name||'';
      const cat=p.categories_tags?.[0]?.replace('en:','').replace(/-/g,' ')||'';
      if(name){
        S.newP.name=name.substring(0,60);
        if(cat)S.newP.cat=cat.charAt(0).toUpperCase()+cat.slice(1);
        S.newP.searchingOnline=false;
        notify('✓ Producto encontrado en línea');render();return;
      }
    }
    S.newP.searchingOnline=false;
    notify('No encontrado en línea — llena manualmente','err');render();
  }catch(e){
    S.newP.searchingOnline=false;
    notify('Sin conexión para buscar en línea','err');render();
  }
}

// ── Lógica ventas ──────────────────────────────────────────────
function cartTotal(){return S.cart.reduce((t,c)=>t+(c.price*(c.qty||c.weight||0)),0);}
function cartProfit(){return S.cart.reduce((t,c)=>t+((c.price-c.cost)*(c.qty||c.weight||0)),0);}
function cartChange(){return S.paid?Math.max(0,parseFloat(S.paid)-cartTotal()):0;}

function addByBarcode(code){
  if(!code||!code.trim())return;
  const p=S.prods.find(p=>p.barcode===code.trim());
  if(!p){notify('No encontrado: '+code,'err');return;}
  if(p.stock<=0){notify('Sin stock: '+p.name,'err');return;}
  // Si es por peso, abrir modal de peso
  if(p.unit==='kg'){S.weightModal=p;S.weightInput='';render();return;}
  const ex=S.cart.find(c=>c.barcode===p.barcode);
  if(ex){if(ex.qty>=p.stock){notify('Sin suficiente existencia','err');return;}
    S.cart=S.cart.map(c=>c.barcode===p.barcode?{...c,qty:c.qty+1}:c);
  }else S.cart=[...S.cart,{...p,qty:1}];
  notify('✓ '+p.name);
}

function addByWeight(prod,weight){
  const w=parseFloat(weight);
  if(!w||w<=0){notify('Ingresa un peso válido','err');return;}
  if(w>prod.stock){notify('No hay suficiente stock ('+prod.stock+'kg)','err');return;}
  const ex=S.cart.find(c=>c.barcode===prod.barcode);
  if(ex)S.cart=S.cart.map(c=>c.barcode===prod.barcode?{...c,weight:+(c.weight+w).toFixed(3)}:c);
  else S.cart=[...S.cart,{...prod,qty:null,weight:w}];
  S.weightModal=null;S.weightInput='';
  notify(`✓ ${prod.name} — ${fmtW(w)}`);
}

function finalizeSale(){
  if(!S.cart.length)return;
  const total=cartTotal(),profit=cartProfit();
  const sale={
    id:'s'+Date.now(),date:todayStr(),timestamp:Date.now(),
    items:S.cart.map(it=>({...it})),total,profit,
    paid:parseFloat(S.paid)||total,change:cartChange(),
    payMethod:S.payMethod,cashierName:S.cashier,
    cancelled:false,cancelledBy:null,cancelReason:null,
  };
  const ns=[...S.sales,sale];setSales(ns);S.sales=ns;
  // Descontar stock
  const np=S.prods.map(p=>{
    const it=S.cart.find(c=>c.barcode===p.barcode);
    if(!it)return p;
    const used=it.qty!=null?it.qty:it.weight;
    return{...p,stock:+(p.stock-used).toFixed(3)};
  });
  setProds(np);S.prods=np;
  S.cart=[];S.paid='';S.payMethod='cash';S.receipt=sale;render();
}

function cancelSale(sale,reason){
  const np=S.prods.map(p=>{
    const it=sale.items.find(i=>i.barcode===p.barcode);
    if(!it)return p;
    const used=it.qty!=null?it.qty:it.weight;
    return{...p,stock:+(p.stock+used).toFixed(3)};
  });
  setProds(np);S.prods=np;
  const ns=S.sales.map(s=>s.id===sale.id?{...s,cancelled:true,cancelledBy:S.cashier,cancelReason:reason}:s);
  setSales(ns);S.sales=ns;
  S.cancelModal=null;notify('⛔ Venta cancelada — stock restaurado');
}

function updateStock(barcode,qty){
  S.prods=S.prods.map(p=>p.barcode===barcode?{...p,stock:parseFloat(qty)||0}:p);
  setProds(S.prods);S.updateStockModal=null;notify('✓ Existencia actualizada');render();
}

function filterPeriod(sales,period){
  const now=new Date();
  return sales.filter(v=>{
    const d=new Date(v.timestamp);
    if(period==='day')return v.date===todayStr();
    if(period==='week'){const s=new Date(now);s.setDate(now.getDate()-now.getDay());s.setHours(0,0,0,0);return d>=s;}
    if(period==='month')return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    if(period==='year')return d.getFullYear()===now.getFullYear();
    return true;
  });
}

let scanStream=null,scanIv=null;
function stopScanner(){clearInterval(scanIv);scanIv=null;if(scanStream){scanStream.getTracks().forEach(t=>t.stop());scanStream=null;}}
async function startScanner(cb){
  stopScanner();const v=G('sv');if(!v)return;
  try{
    scanStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    v.srcObject=scanStream;
    if('BarcodeDetector' in window){
      const det=new BarcodeDetector({formats:['ean_13','ean_8','code_128','upc_a','upc_e']});
      scanIv=setInterval(async()=>{if(v.readyState===4){const c=await det.detect(v).catch(()=>[]);if(c.length){stopScanner();cb(c[0].rawValue);}}},400);
    }
  }catch(e){}
}

function renderSearch(){
  const d=D();const q=S.searchQ;const el=G('search-res');if(!el)return;
  if(!q){el.innerHTML='';return;}
  const r=S.prods.filter(p=>p.name.toLowerCase().includes(q.toLowerCase())).slice(0,8);
  el.innerHTML=r.map(p=>`<div onclick="addByBarcode('${p.barcode}');S.searchQ='';G('search-inp').value='';G('search-res').innerHTML='';"
    style="padding:10px 12px;border-radius:9px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;"

    </div>
    <div style="color:#00e5a0;font-weight:700;font-size:15px;">${fmt(p.price)}${p.unit==='kg'?'/kg':''}</div>

function renderChange(){
  const paid=parseFloat(G('paid-inp')?.value||0),total=cartTotal();
  const box=G('change-box'),val=G('change-val');if(!box||!val)return;
  if(paid>=total&&paid>0){box.style.display='flex';val.textContent=fmt(Math.max(0,paid-total));}
  else box.style.display='none';
}

// ── Handlers globales ──────────────────────────────────────────
window.ST=t=>{S.tab=t;S.searchQ='';S.invSearchQ='';S.cfgEdit={};render();};
window.doLogout=doLogout;window.doLogin1=doLogin1;window.doLoginPin=doLoginPin;
window.addByBarcode=addByBarcode;window.addByWeight=addByWeight;window.finalizeSale=finalizeSale;
window.filterPeriod=filterPeriod;window.printReport=printReport;window.printTicket=printTicket;window.sendWA=sendWA;
window.searchProductOnline=searchProductOnline;window.G=G;window.S=S;window.cfg=cfg;

window.CQ=(b,delta)=>{const p=S.prods.find(p=>p.barcode===b);S.cart=S.cart.map(c=>{if(c.barcode!==b)return c;const nq=c.qty+delta;if(nq<1)return c;if(nq>p?.stock){notify('Sin suficiente existencia','err');return c;}return{...c,qty:nq};});render();};
window.adjW=(b,delta)=>{const p=S.prods.find(p=>p.barcode===b);S.cart=S.cart.map(c=>{if(c.barcode!==b)return c;const nw=+(c.weight+delta).toFixed(3);if(nw<=0)return c;if(nw>p?.stock){notify('No hay suficiente stock','err');return c;}return{...c,weight:nw};});render();};
window.RC=b=>{S.cart=S.cart.filter(c=>c.barcode!==b);render();};
window.invSD=code=>{stopScanner();S.invScannerOpen=false;const p=S.prods.find(p=>p.barcode===code.trim());if(p){S.updateStockModal=code.trim();}else{S.newP={barcode:code.trim(),name:'',cat:'',unit:'pieza',cost:'',price:'',stock:'',min:'5',highRotation:false,expiryDays:'',searchingOnline:false};S.addModal=true;}render();};
window.SD=code=>{stopScanner();S.scanner=false;addByBarcode(code);render();};
window.SDA=code=>{stopScanner();S.scanForAdd=false;S.newP.barcode=code;notify('✓ Código escaneado: '+code);render();};
window.UNP=()=>{const cost=parseFloat(S.newP.cost)||0,price=parseFloat(S.newP.price)||0;const el=G('np-margin');if(!el)return;if(cost>0&&price>0){el.style.display='block';el.innerHTML=`Ganancia: <b style="color:#00e5a0;">${fmt(price-cost)} (${(((price-cost)/cost)*100).toFixed(0)}%)</b>`;}else el.style.display='none';};
window.SNP=()=>{
  const p=S.newP;
  if(!p.barcode||!p.name){notify('Código y nombre requeridos','err');return;}
  const existing=S.prods.find(pr=>pr.barcode===p.barcode);
  if(existing){
    const newStock=+(existing.stock+(parseFloat(p.stock)||0)).toFixed(3);
    // Calcular fecha caducidad si aplica
    const expDate=p.highRotation&&p.expiryDays&&parseInt(p.expiryDays)>0?
      (()=>{const d=new Date();d.setDate(d.getDate()+parseInt(p.expiryDays));return d.toISOString().split('T')[0];})():existing.expiryDate;
    S.prods=S.prods.map(pr=>pr.barcode===p.barcode?{...pr,stock:newStock,...(expDate?{expiryDate:expDate}:{})}:pr);
    setProds(S.prods);S.addModal=false;notify(`✓ Existencia actualizada: ${existing.name} → ${newStock}${existing.unit==='kg'?' kg':' pzas'}`);render();return;
  }
  const expDate=p.highRotation&&p.expiryDays&&parseInt(p.expiryDays)>0?
    (()=>{const d=new Date();d.setDate(d.getDate()+parseInt(p.expiryDays));return d.toISOString().split('T')[0];})():null;
  const newProd={...p,cost:+p.cost,price:+p.price,stock:+p.stock,min:+p.min||5,expiryDate:expDate};
  S.prods=[...S.prods,newProd];setProds(S.prods);S.addModal=false;notify('✓ Producto agregado');render();
};
window.saveStock=()=>{
  const qty=G('new-qty')?.value;const expEl=G('upd-exp');
  const barcode=S.updateStockModal;const p=S.prods.find(p=>p.barcode===barcode);if(!p)return;
  const updates={stock:parseFloat(qty)||0};
  if(expEl&&expEl.value)updates.expiryDate=expEl.value;
  S.prods=S.prods.map(pr=>pr.barcode===barcode?{...pr,...updates}:pr);
  setProds(S.prods);S.updateStockModal=null;notify('✓ Existencia actualizada');render();
};
window.saveCFG=()=>{
  const c=getCFG();const merged={...c,...S.cfgEdit};
  const passEl=G('cfg-pass');if(passEl&&passEl.value)merged.password=passEl.value;
  if(!merged.storeName){notify('El nombre del negocio es requerido','err');return;}
  if(fbOk&&db)db.ref('config').set(merged);
  setCFG(merged);S.cfgEdit={};notify('✓ Configuración guardada');render();
};
window.CC=()=>{
  const reason=G('cr')?.value,pass=G('cp')?.value,e=G('ce');
  if(!reason){if(e){e.style.display='block';e.textContent='Selecciona un motivo.';}return;}
  if(pass!==cfg().password){if(e){e.style.display='block';e.textContent='Contraseña incorrecta.';}return;}
  cancelSale(S.cancelModal,reason);render();
};
window.renderSearch=renderSearch;window.renderChange=renderChange;
window.updateStock=updateStock;

// Teclado
document.addEventListener('keydown',e=>{
  if(S.screen!=='pos')return;
  if(e.key==='Escape'){
    if(S.scanner){stopScanner();S.scanner=false;render();return;}
    if(S.scanForAdd){stopScanner();S.scanForAdd=false;render();return;}
    if(S.invScannerOpen){stopScanner();S.invScannerOpen=false;render();return;}
    if(S.weightModal){S.weightModal=null;render();return;}
    if(S.receipt){S.receipt=null;render();return;}
    if(S.whatsModal){S.whatsModal=null;S.whatsNum='';render();return;}
    if(S.cancelModal){S.cancelModal=null;render();return;}
    if(S.addModal){S.addModal=false;render();return;}
    if(S.updateStockModal){S.updateStockModal=null;render();return;}
    if(S.prodDetailModal){S.prodDetailModal=null;render();return;}
  }
  if(e.key==='F2'){e.preventDefault();ST('sell');}
  if(e.key==='F3'&&isCaja1()){e.preventDefault();ST('inv');}
  if(e.key==='F4'&&isCaja1()){e.preventDefault();ST('rep');}
  if(e.key==='F5'&&isCaja1()){e.preventDefault();ST('cfg');}
});

// Init
S.prods=getProds();S.sales=getSales();render();
</script>
</body>
</html>
