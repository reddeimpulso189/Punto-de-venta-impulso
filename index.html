})();

  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
};
function getCFG(){return LS.get("pvi_cfg",{...CFG_INIT});}
function setCFG(c){LS.set("pvi_cfg",c);if(fbOk&&db)db.ref("config").set(c);}
function getProds(){return LS.get("pvi_prods",BASE_PRODS.map(p=>({...p})));}

function getSales(){return LS.get("pvi_sales",[]);}
function setSales(s){LS.set("pvi_sales",s);if(fbOk&&db){const o={};s.forEach(x=>o[x.id]=x);db.ref("sales").set(o);}}
function getCuts(){return LS.get("pvi_cuts",[]);}
function setCuts(c){LS.set("pvi_cuts",c);}
(()=>{const s=getCFG();Object.assign(CFG_INIT,s);})();
if(fbOk&&db){
  db.ref("config").on("value",snap=>{if(snap.exists())setCFG(snap.val());});
  db.ref("products").on("value",snap=>{if(snap.exists()){const p=Object.values(snap.val());LS.set("pvi_prods",p);S.prods=p;render();}});
  db.ref("sales").on("value",snap=>{if(snap.exists()){const s=Object.values(snap.val());LS.set("pvi_sales",s);S.sales=s;render();}});
}

function expSt(p){
  if(!p.expiryDate)return null;
  const diff=Math.ceil((new Date(p.expiryDate)-new Date())/864e5);
  if(diff<0)return{s:"exp",label:"CADUCADO",color:"#ff4444"};
  if(diff<=7)return{s:"soon",label:"Caduca en "+diff+"d",color:"#ff8844"};
  return{s:"ok",label:"Cad: "+new Date(p.expiryDate).toLocaleDateString("es-MX"),color:"#888"};
}
const lowSt=()=>S.prods.filter(p=>p.useStock&&p.min>0&&p.stock<=p.min);
const nearExp=()=>S.prods.filter(p=>{const e=expSt(p);return e&&(e.s==="exp"||e.s==="soon");});

// ─── Carrito ───────────────────────────────────────────
function cTotal(){return S.cart.reduce((t,c)=>t+c.price*(c.qty??c.weight??0),0);}
function cProfit(){return S.cart.reduce((t,c)=>t+(c.price-c.cost)*(c.qty??c.weight??0),0);}
function cChange(){return S.paid?Math.max(0,parseFloat(S.paid)-cTotal()):0;}

function addToCart(bc){
  if(!bc?.trim())return;
  const p=S.prods.find(p=>p.barcode===bc.trim());
  if(!p){notify("No encontrado: "+bc,"err");return;}
  if(p.useStock&&p.stock<=0){notify("Sin stock: "+p.name,"err");return;}
  if(p.sellType==="bulk"){S.weightModal=p;S.weightInput="";render();return;}
  const ex=S.cart.find(c=>c.barcode===p.barcode);
  if(ex){if(p.useStock&&ex.qty>=p.stock){notify("Sin suficiente existencia","err");return;}
    S.cart=S.cart.map(c=>c.barcode===p.barcode?{...c,qty:c.qty+1}:c);
  }else S.cart=[...S.cart,{...p,qty:1}];
  notify("✓ "+p.name);
}

function addByW(prod,w){
  const wf=parseFloat(w);if(!wf||wf<=0){notify("Peso inválido","err");return;}
  if(prod.useStock&&wf>prod.stock){notify("Stock máx: "+prod.stock+"kg","err");return;}
  const ex=S.cart.find(c=>c.barcode===prod.barcode);
  if(ex)S.cart=S.cart.map(c=>c.barcode===prod.barcode?{...c,weight:+(c.weight+wf).toFixed(3)}:c);
  else S.cart=[...S.cart,{...prod,qty:null,weight:wf}];
  S.weightModal=null;S.weightInput="";notify("✓ "+prod.name+" — "+fkg(wf));
}

function finSale(){
  if(!S.cart.length)return;
  const total=cTotal(),profit=cProfit();
  const sale={id:uid(),date:tod(),timestamp:Date.now(),items:S.cart.map(i=>({...i})),total,profit,
    paid:parseFloat(S.paid)||total,change:cChange(),payMethod:S.payMethod,
    txRef:S.payMethod==="card"?S.txRef:"",
    cashierName:S.cashier,cancelled:false,cancelledBy:null,cancelReason:null};
  const ns=[...S.sales,sale];setSales(ns);S.sales=ns;
  const np=S.prods.map(p=>{const it=S.cart.find(c=>c.barcode===p.barcode);if(!it||!p.useStock)return p;return{...p,stock:+(p.stock-(it.qty??it.weight??0)).toFixed(3)};});
  setProds(np);S.prods=np;
  S.cart=[];S.paid="";S.txRef="";S.payMethod="cash";S.receipt=sale;render();
}

function cancelSale(sale,reason){
  const np=S.prods.map(p=>{const it=sale.items.find(i=>i.barcode===p.barcode);if(!it||!p.useStock)return p;return{...p,stock:+(p.stock+(it.qty??it.weight??0)).toFixed(3)};});
  setProds(np);S.prods=np;
  const ns=S.sales.map(s=>s.id===sale.id?{...s,cancelled:true,cancelledBy:S.cashier,cancelReason:reason}:s);
  setSales(ns);S.sales=ns;S.cancelModal=null;notify("⛔ Venta cancelada — stock restaurado");
}

function saveProd(){
  const p=S.prodModal.prod;
  if(!p.barcode||!p.name){notify("Código y nombre requeridos","err");return;}
  if(p._priceMode==="pct"&&p.cost>0)p.price=+(p.cost*(1+p.margin/100)).toFixed(2);
  if(p.highRotation&&p.expiryDays&&parseInt(p.expiryDays)>0&&!p.expiryDate){
    const d=new Date();d.setDate(d.getDate()+parseInt(p.expiryDays));p.expiryDate=d.toISOString().split("T")[0];
  }
  const ei=S.prods.findIndex(x=>x.id===p.id);
  let np;
  if(ei>=0){np=S.prods.map(x=>x.id===p.id?p:x);}
  else{
    const bi=S.prods.findIndex(x=>x.barcode===p.barcode&&x.id!==p.id);
    if(bi>=0){np=S.prods.map(x=>x.barcode===p.barcode?{...x,stock:+(x.stock+p.stock).toFixed(3)}:x);setProds(np);S.prods=np;S.prodModal=null;notify("✓ Existencia sumada a "+S.prods.find(x=>x.barcode===p.barcode).name);render();return;}
    np=[...S.prods,p];

function doCut(){
  const c=C();const ts=S.sales.filter(s=>s.date===tod());const ac=ts.filter(s=>!s.cancelled);
  const rev=ac.reduce((a,v)=>a+v.total,0),prf=ac.reduce((a,v)=>a+v.profit,0);
  const byM={cash:0,card:0,transfer:0};ac.forEach(s=>{byM[s.payMethod]=(byM[s.payMethod]||0)+s.total;});
  const byCaja={};ac.forEach(s=>{const n=s.cashierName||"Caja 1";if(!byCaja[n])byCaja[n]={rev:0,profit:0,count:0};byCaja[n].rev+=s.total;byCaja[n].profit+=s.profit;byCaja[n].count++;});
  const cut={id:uid(),date:tod(),timestamp:Date.now(),cashierName:S.cashier,storeName:c.storeName,
    totalSales:ac.length,cancelled:ts.filter(s=>s.cancelled).length,revenue:rev,profit:prf,byM,byCaja,sales:ts.map(s=>({...s}))};

e:9px;color:#aaa;text-align:center;margin-top:10px;">Punto de Venta Impulso · ${new Date().toLocaleString("es-MX")}</div></body></html>`);

function filterPeriod(sales,period){
  const now=new Date();
  return sales.filter(v=>{const d=new Date(v.timestamp);
    if(period==="day")return v.date===tod();
    if(period==="week"){const s=new Date(now);s.setDate(now.getDate()-now.getDay());s.setHours(0,0,0,0);return d>=s;}
    if(period==="month")return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    if(period==="year")return d.getFullYear()===now.getFullYear();
    return true;
  });
}

function doLoginPin(){

function htmlProds(){
  const d=D();

  let subNav='<div style="display:flex;gap:7px;margin-bottom:10px;"><button onclick="S.prodSubView=\'list\';render()" style="flex:1;padding:10px;border-radius:9px;border:2px solid '+(S.prodSubView==="list"?"#00e5a0":d.brd)+';background:'+(S.prodSubView==="list"?(S.dark?"rgba(0,229,160,0.12)":"rgba(0,180,130,0.08)"):"transparent")+';color:'+(S.prodSubView==="list"?"#00e5a0":d.sub)+';cursor:pointer;font-size:12px;font-weight:'+(S.prodSubView==="list"?700:400)+';font-family:\'DM Sans\',sans-serif;">📦 Catálogo de productos</button><button onclick="S.prodSubView=\'inv\';render()" style="flex:1;padding:10px;border-radius:9px;border:2px solid '+(S.prodSubView==="inv"?"#00b4d8":d.brd)+';background:'+(S.prodSubView==="inv"?(S.dark?"rgba(0,180,216,0.12)":"rgba(0,130,200,0.08)"):"transparent")+';color:'+(S.prodSubView==="inv"?"#00b4d8":d.sub)+';cursor:pointer;font-size:12px;font-weight:'+(S.prodSubView==="inv"?700:400)+';font-family:\'DM Sans\',sans-serif;">📋 Inventario</button></div>';
  if(S.prodSubView==="inv")return subNav+htmlInvInline();

  let prods=[...S.prods];
  if(S.prodSearch)prods=prods.filter(p=>p.name.toLowerCase().includes(S.prodSearch.toLowerCase())||p.barcode.includes(S.prodSearch)||(p.brand||"").toLowerCase().includes(S.prodSearch.toLowerCase())||(p.dept||"").toLowerCase().includes(S.prodSearch.toLowerCase()));
  if(S.prodFilterDept!=="all")prods=prods.filter(p=>(p.dept||"Sin Departamento")===S.prodFilterDept);
  prods.sort((a,b)=>{let va,vb;
    if(S.prodSort==="name"){va=a.name||"";vb=b.name||"";}
    else if(S.prodSort==="stock"){va=a.stock||0;vb=b.stock||0;}
    else if(S.prodSort==="profit"){va=(a.price||0)-(a.cost||0);vb=(b.price||0)-(b.cost||0);}
    else if(S.prodSort==="brand"){va=a.brand||"";vb=b.brand||"";}
    else if(S.prodSort==="dept"){va=a.dept||"";vb=b.dept||"";}
    else{va=a.price||0;vb=b.price||0;}
    const cmp=typeof va==="string"?(va||"").localeCompare(vb||""):(va||0)-(vb||0);
    return S.prodSortDir==="asc"?cmp:-cmp;
  });

  let html=subNav;
  // Barra toolbar
  html+='<div style="'+crd()+'padding:10px 12px;">';
  html+='<div style="display:flex;gap:7px;margin-bottom:9px;"><input id="ps" placeholder="🔍 Buscar por nombre, marca, código o departamento..." oninput="S.prodSearch=this.value;dbRender()" style="'+IS()+'flex:1;"/><button onclick="openNewProd()" class="bp" style="padding:10px 15px;white-space:nowrap;font-size:12px;">+ Nuevo</button><button onclick="S.scanner=true;S.scanForAdd=true;render()" style="'+BS(S.dark?"#1a3a2a":"#e0f5ed")+';padding:10px 13px;font-size:19px;color:#00e5a0;">📷</button></div>';

  html+='<div style="display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-bottom:8px;"><span style="color:'+d.sub+';font-size:11px;font-weight:600;">Ordenar:</span>';

    const act=S.prodSort===k;
    html+='<button onclick="if(S.prodSort===\''+k+'\')S.prodSortDir=S.prodSortDir===\'asc\'?\'desc\':\'asc\';else{S.prodSort=\''+k+'\';S.prodSortDir=\'asc\';}render()" style="padding:5px 10px;border-radius:7px;border:1.5px solid '+(act?"#00e5a0":d.brd)+';background:'+(act?(S.dark?"rgba(0,229,160,0.1)":"rgba(0,180,130,0.08)"):"transparent")+';color:'+(act?"#00e5a0":d.sub)+';cursor:pointer;font-size:11px;font-weight:'+(act?700:400)+';font-family:\'DM Sans\',sans-serif;">'+lbl+(act?(S.prodSortDir==="asc"?" ↑":" ↓"):"")+'</button>';
  });

  html+='<button onclick="S.confirmModal={msg:\'¿Generar corte del día? Esto guarda el resumen de ventas de hoy.\',icon:\'📋\',onConfirm:()=>{S.confirmModal=null;doCut();render();}};render()" class="bp" style="width:100%;padding:13px;font-size:15px;">📋 Generar corte del día</button></div>';

      <div style="padding:0 10px;flex:1;">${TABS.map(sbBtn).join("")}</div>
      <div style="padding:14px 16px;border-top:1px solid ${d.brd};">
        ${alerts>0?`<div style="background:rgba(255,68,68,0.1);border:1px solid rgba(255,68,68,0.25);border-radius:7px;padding:7px 10px;margin-bottom:9px;cursor:pointer;" onclick="ST('prods');S.prodSubView='inv';render()"><div style="color:#ff4444;font-size:11px;font-weight:700;">🔴 ${alerts} alerta(s)</div></div>`:""}
        <div style="margin-bottom:9px;"><div style="color:#00e5a0;font-weight:900;font-size:16px;">${f$(todPrf())}</div><div style="font-size:9px;color:${d.sub};">mi ganancia hoy</div></div>
        ${S.showInstall?`<button onclick="doInstall()" style="width:100%;margin-bottom:7px;padding:7px;background:rgba(0,229,160,0.08);border:1px solid rgba(0,229,160,0.25);color:#00e5a0;border-radius:7px;cursor:pointer;font-size:11px;font-weight:700;font-family:'DM Sans',sans-serif;">📲 Instalar como app</button>`:""}
        <div style="display:flex;gap:5px;">
          <button onclick="S.dark=!S.dark;render()" style="flex:1;padding:7px;background:${S.dark?"rgba(255,255,255,0.06)":"rgba(0,0,0,0.05)"};border:1px solid ${d.brd};color:${d.fg};border-radius:7px;cursor:pointer;font-size:14px;">${S.dark?"☀️":"🌙"}</button>
          <button onclick="doLogout()" style="flex:2;padding:7px;background:transparent;border:1px solid ${d.brd};color:${d.sub};border-radius:7px;cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif;">Salir</button>
        </div>
      </div>
    </div>
    <div class="pm">
      <div class="pt" style="background:${d.hdr};border-bottom:1px solid ${d.brd};">
        <div style="font-weight:700;font-size:17px;color:${d.fg};">${titulos[S.tab]||"🛒 Ventas"}</div>
        <div style="font-size:11px;color:${d.sub};">${new Date().toLocaleDateString("es-MX",{weekday:"long",day:"numeric",month:"long"})}</div>
      </div>
      <div class="pc" style="max-width:880px;">${content}</div>
    </div>
  </div>
  ${htmlModals()}`;
  setTimeout(()=>{
    const ss=G("ss");if(ss&&document.activeElement!==ss)ss.value=S.sellSearch||"";
    const ps=G("ps");if(ps&&document.activeElement!==ps)ps.value=S.prodSearch||"";
  },0);
}

// ─── Handlers globales ─────────────────────────────────
window.ST=t=>{S.tab=t;S.prodModal=null;S.confirmModal=null;render();};
window.doLogout=doLogout;window.doLogin1=doLogin1;window.doLoginPin=doLoginPin;
window.addToCart=addToCart;window.addByW=addByW;window.finSale=finSale;
window.filterPeriod=filterPeriod;window.sendWA=sendWA;window.printTicket=printTicket;
window.printCut=printCut;window.printInventory=printInventory;
window.openNewProd=openNewProd;window.saveProd=saveProd;window.delProd=delProd;
window.searchOnline=searchOnline;window.doCut=doCut;
window.doInstall=doInstall;window.dbRender=dbRender;
window.renderSellSearch=renderSellSearch;window.rChg=rChg;
window.G=G;window.S=S;window.C=C;window.f$=f$;window.fkg=fkg;

window.CQ=(b,delta)=>{const p=S.prods.find(p=>p.barcode===b);S.cart=S.cart.map(c=>{if(c.barcode!==b)return c;const nq=c.qty+delta;if(nq<1)return c;if(p?.useStock&&nq>p.stock){notify("Sin suficiente existencia","err");return c;}return{...c,qty:nq};});render();};
window.AW=(b,delta)=>{const p=S.prods.find(p=>p.barcode===b);S.cart=S.cart.map(c=>{if(c.barcode!==b)return c;const nw=+(c.weight+delta).toFixed(3);if(nw<=0)return c;if(p?.useStock&&nw>p.stock){notify("Sin suficiente stock","err");return c;}return{...c,weight:nw};});render();};
window.RC=b=>{S.cart=S.cart.filter(c=>c.barcode!==b);render();};
window.SD=code=>{stopScan();S.scanner=false;addToCart(code);render();};
window.SDA=code=>{stopScan();S.scanner=false;S.scanForAdd=false;if(S.prodModal)S.prodModal.prod.barcode=code;else openNewProd(code);render();};
window.CC=()=>{
  const reason=G("cr")?.value,pass=G("cp")?.value,e=G("ce");
  if(!reason){if(e){e.style.display="block";e.textContent="Selecciona un motivo.";}return;}
  if(pass!==C().password){if(e){e.style.display="block";e.textContent="Contraseña incorrecta.";}return;}
  cancelSale(S.cancelModal,reason);render();
};
window.saveCFG=()=>{
  const c=getCFG();const merged={...c,...S.cfgEdit};
  const passEl=G("cfg-pass");if(passEl&&passEl.value)merged.password=passEl.value;
  if(!merged.storeName){notify("Nombre del negocio requerido","err");return;}
  setCFG(merged);Object.assign(CFG_INIT,merged);S.cfgEdit={};notify("✓ Configuración guardada");render();
};

// Teclado
document.addEventListener("keydown",e=>{
  if(S.screen!=="pos")return;
  if(e.key==="Escape"){
    if(S.scanner||S.scanForAdd){stopScan();S.scanner=false;S.scanForAdd=false;render();return;}
    if(S.weightModal){S.weightModal=null;render();return;}
    if(S.confirmModal){S.confirmModal=null;render();return;}
    if(S.prodModal){S.prodModal=null;render();return;}
    if(S.receipt){S.receipt=null;render();return;}
    if(S.whatsModal){S.whatsModal=null;S.whatsNum="";render();return;}
    if(S.cancelModal){S.cancelModal=null;render();return;}
  }
  if(e.key==="F2"){e.preventDefault();ST("sell");}
  if(isCaja1()&&e.key==="F3"){e.preventDefault();ST("prods");}
  if(isCaja1()&&e.key==="F4"){e.preventDefault();ST("cfg");}
  if(isCaja1()&&e.key==="F5"){e.preventDefault();ST("cut");}
  if(isCaja1()&&e.key==="F6"){e.preventDefault();ST("reports");}
});

// ─── Init ──────────────────────────────────────────────
S.prods=getProds();S.sales=getSales();S.cuts=getCuts();render();
</script>
</body>
</html>
