/* Layout PC */
.pc-wrap{display:flex;min-height:100vh;}
.pc-sidebar{width:200px;flex-shrink:0;position:fixed;top:0;left:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column;z-index:50;}

.mob-wrap{display:flex;flex-direction:column;min-height:100vh;max-width:480px;margin:0 auto;}
.mob-hdr{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:90;backdrop-filter:blur(20px);}
.mob-cnt{flex:1;overflow-y:auto;padding:12px 12px 90px;}
.mob-nav{display:flex;position:fixed;bottom:0;left:0;right:0;z-index:90;backdrop-filter:blur(20px);max-width:480px;margin:0 auto;}
@media(max-width:768px){.pc-wrap{display:none!important;}.mob-wrap{display:flex!important;}}
@media(min-width:769px){.pc-wrap{display:flex!important;}.mob-wrap{display:none!important;}}
/* Shared */
.bp{padding:11px 18px;background:linear-gradient(135deg,#00e5a0,#00c896);color:#000;border:none;border-radius:10px;font-weight:700;cursor:pointer;font-size:13px;transition:opacity .15s;}
.bp:hover{opacity:.9;}
.card{border-radius:14px;padding:14px;margin-bottom:10px;animation:fadeUp .2s ease;}

  get:(k,fb)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
};
function getCFG(){return LS.get('pvi_cfg',{...CFG_INIT});}
function setCFG(c){LS.set('pvi_cfg',c);if(fbOk&&db)db.ref('config').set(c);}

function getSales(){return LS.get('pvi_sales',[]);}
function setSales(s){LS.set('pvi_sales',s);if(fbOk&&db){const o={};s.forEach(x=>o[x.id]=x);db.ref('sales').set(o);}}
function getCuts(){return LS.get('pvi_cuts',[]);}
function setCuts(c){LS.set('pvi_cuts',c);}
(()=>{const s=getCFG();Object.assign(CFG_INIT,s);})();
if(fbOk&&db){
  db.ref('config').on('value',snap=>{if(snap.exists())setCFG(snap.val());});

  db.ref('sales').on('value',snap=>{if(snap.exists()){const s=Object.values(snap.val());LS.set('pvi_sales',s);S.sales=s;render();}});
}

// ── Caducidad ──────────────────────────────────────────────
function expStatus(p){
  if(!p.expiryDate)return null;
  const diff=Math.ceil((new Date(p.expiryDate)-new Date())/(864e5));
  if(diff<0)return{s:'expired',label:'CADUCADO',color:'#ff4444'};
  if(diff<=7)return{s:'soon',label:`Caduca en ${diff}d`,color:'#ff8844'};
  return{s:'ok',label:`Caduca ${new Date(p.expiryDate).toLocaleDateString('es-MX')}`,color:'#888'};
}

// ── Carrito ────────────────────────────────────────────────
function cartTotal(){return S.cart.reduce((t,c)=>t+c.price*(c.qty??c.weight??0),0);}
function cartProfit(){return S.cart.reduce((t,c)=>t+(c.price-c.cost)*(c.qty??c.weight??0),0);}
function cartChange(){return S.paid?Math.max(0,parseFloat(S.paid)-cartTotal()):0;}

function addToCart(barcode){
  if(!barcode?.trim())return;
  const p=S.prods.find(p=>p.barcode===barcode.trim());
  if(!p){notify('No encontrado: '+barcode,'err');return;}
  if(p.useStock&&p.stock<=0){notify('Sin stock: '+p.name,'err');return;}
  if(p.sellType==='bulk'){S.weightModal=p;S.weightInput='';render();return;}
  const ex=S.cart.find(c=>c.barcode===p.barcode);
  if(ex){
    if(p.useStock&&ex.qty>=p.stock){notify('Sin suficiente existencia','err');return;}
    S.cart=S.cart.map(c=>c.barcode===p.barcode?{...c,qty:c.qty+1}:c);
  }else S.cart=[...S.cart,{...p,qty:1}];
  notify('✓ '+p.name);
}

function addByWeight(prod,w){
  const wf=parseFloat(w);if(!wf||wf<=0){notify('Peso inválido','err');return;}
  if(prod.useStock&&wf>prod.stock){notify(`Stock máximo: ${prod.stock}kg`,'err');return;}
  const ex=S.cart.find(c=>c.barcode===prod.barcode);
  if(ex)S.cart=S.cart.map(c=>c.barcode===prod.barcode?{...c,weight:+(c.weight+wf).toFixed(3)}:c);
  else S.cart=[...S.cart,{...prod,qty:null,weight:wf}];
  S.weightModal=null;S.weightInput='';notify(`✓ ${prod.name} — ${fkg(wf)}`);
}

function finalizeSale(){
  if(!S.cart.length)return;
  const total=cartTotal(),profit=cartProfit();
  const sale={
    id:uid(),date:today(),timestamp:Date.now(),
    items:S.cart.map(i=>({...i})),total,profit,
    paid:parseFloat(S.paid)||total,change:cartChange(),
    payMethod:S.payMethod,cashierName:S.cashier,
    cancelled:false,cancelledBy:null,cancelReason:null,
  };
  const ns=[...S.sales,sale];setSales(ns);S.sales=ns;
  {
    const np=S.prods.map(p=>{
      const it=S.cart.find(c=>c.barcode===p.barcode);
      if(!it||!p.useStock)return p;
      return{...p,stock:+(p.stock-(it.qty??it.weight??0)).toFixed(3)};
    });
    setProds(np);S.prods=np;
  }
  S.cart=[];S.paid='';S.payMethod='cash';S.receipt=sale;render();
}

function cancelSale(sale,reason){
  const np=S.prods.map(p=>{
    const it=sale.items.find(i=>i.barcode===p.barcode);
    if(!it||!p.useStock)return p;
    return{...p,stock:+(p.stock+(it.qty??it.weight??0)).toFixed(3)};
  });
  setProds(np);S.prods=np;
  const ns=S.sales.map(s=>s.id===sale.id?{...s,cancelled:true,cancelledBy:S.cashier,cancelReason:reason}:s);
  setSales(ns);S.sales=ns;
  S.cancelModal=null;notify('⛔ Venta cancelada — stock restaurado');
}

function doCut(){
  const c=C();
  const todaySales=S.sales.filter(s=>s.date===today());
  const active=todaySales.filter(s=>!s.cancelled);
  const total=active.reduce((s,v)=>s+v.total,0);
  const profit=active.reduce((s,v)=>s+v.profit,0);
  const byM={cash:0,card:0,transfer:0};
  active.forEach(s=>{byM[s.payMethod]=(byM[s.payMethod]||0)+s.total;});
  const byCaja={};
  active.forEach(s=>{const n=s.cashierName||'Caja 1';if(!byCaja[n])byCaja[n]={rev:0,profit:0,count:0};byCaja[n].rev+=s.total;byCaja[n].profit+=s.profit;byCaja[n].count++;});
  const cut={
    id:uid(),date:today(),timestamp:Date.now(),
    cashierName:S.cashier,storeName:c.storeName,
    totalSales:active.length,cancelled:todaySales.filter(s=>s.cancelled).length,
    revenue:total,profit,byM,byCaja,
    sales:todaySales.map(s=>({...s})),
  };
  const cuts=[cut,...getCuts()];setCuts(cuts);S.cuts=cuts;
  notify('✓ Corte generado y guardado');
  printCut(cut);
}

async function searchOnline(barcode){

  S.prodModal={...S.prodModal,searching:true};render();
  try{
    const r=await fetch(`https://world.openfoodfacts.org/api/v2/product/${barcode}.json`);
    const d=await r.json();
    if(d.status===1&&d.product){
      const p=d.product;
      const name=p.product_name_es||p.product_name||'';
      const brand=p.brands||'';
      const cat=p.categories_tags?.[0]?.replace('en:','').replace(/-/g,' ')||'';
      S.prodModal={...S.prodModal,searching:false,prod:{...S.prodModal.prod,
        name:name.substring(0,60)||S.prodModal.prod.name,
        brand:brand.split(',')[0].trim()||S.prodModal.prod.brand,
      }};

function saveProd(){
  const p=S.prodModal.prod;
  if(!p.barcode||!p.name){notify('Código y nombre requeridos','err');return;}
  // Calcular precio si no está puesto
  if(p.cost>0&&p.margin>0&&p.price===0)p.price=+(p.cost*(1+p.margin/100)).toFixed(2);
  // Calcular fecha caducidad
  if(p.highRotation&&p.expiryDays&&parseInt(p.expiryDays)>0&&!p.expiryDate){
    const d=new Date();d.setDate(d.getDate()+parseInt(p.expiryDays));
    p.expiryDate=d.toISOString().split('T')[0];
  }
  const existing=S.prods.findIndex(x=>x.id===p.id);
  let np;
  if(existing>=0){np=S.prods.map(x=>x.id===p.id?p:x);}
  else{
    // Si el código ya existe, suma stock
    const byBarcode=S.prods.findIndex(x=>x.barcode===p.barcode&&x.id!==p.id);
    if(byBarcode>=0){
      np=S.prods.map(x=>x.barcode===p.barcode?{...x,stock:+(x.stock+p.stock).toFixed(3)}:x);
      setProds(np);S.prods=np;S.prodModal=null;
      notify(`✓ Existencia sumada a ${S.prods.find(x=>x.barcode===p.barcode).name}`);render();return;
    }
    np=[...S.prods,p];
  }
  setProds(np);S.prods=np;S.prodModal=null;
  notify(existing>=0?'✓ Producto actualizado':'✓ Producto agregado');render();
}

function deleteProd(id){
  S.confirmModal={
    msg:'¿Eliminar este producto del catálogo? Esta acción no se puede deshacer.',

      const np=S.prods.filter(p=>p.id!==id);
      setProds(np);S.prods=np;S.prodModal=null;
      notify('🗑️ Producto eliminado');render();
    }
  };render();
}

function filterPeriod(sales,period){
  const now=new Date();
  return sales.filter(v=>{
    const d=new Date(v.timestamp);
    if(period==='day')return v.date===today();
    if(period==='week'){const s=new Date(now);s.setDate(now.getDate()-now.getDay());s.setHours(0,0,0,0);return d>=s;}
    if(period==='month')return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    if(period==='year')return d.getFullYear()===now.getFullYear();
    return true;
  });
}

function doLogin1(){
  const pass=G('l-pass')?.value||'',e=G('l-err');
  if(pass!==C().password){if(e){e.style.display='block';e.textContent='Contraseña incorrecta.';}return;}
  S.cashier=C().caja1Name||'Caja 1';S.prods=getProds();S.sales=getSales();S.cuts=getCuts();S.cart=[];
  S.screen=C().blocked?'blocked':'pos';render();
}
function doLoginPin(){
  const pin=G('pin-input')?.value||'',num=G('pin-caja')?.value||'2',e=G('pin-err');
  const ok=(num==='2'&&pin===C().pin2)||(num==='3'&&pin===C().pin3);
  if(!ok){if(e){e.style.display='block';e.textContent='PIN incorrecto.';}return;}
  S.cashier=(num==='2'?C().caja2Name:C().caja3Name)||`Caja ${num}`;
  S.prods=getProds();S.sales=getSales();S.cart=[];
  S.screen=C().blocked?'blocked':'pos';S.loginStep='main';render();
}
function doLogout(){S.screen='login';S.cashier=null;S.tab='sell';S.cart=[];S.prodSearch='';render();}

function rBlocked(){const c=C();return`<div style="min-height:100vh;background:#0a0a15;display:flex;align-items:center;justify-content:center;padding:24px;"><div style="text-align:center;max-width:320px;"><div style="font-size:64px;margin-bottom:16px;">🔒</div><div style="color:#ff6b6b;font-size:22px;font-weight:900;margin-bottom:8px;">Acceso suspendido</div><div style="color:#555;font-size:13px;margin-bottom:6px;font-weight:600;">${c.storeName}</div><div style="color:#444;font-size:12px;line-height:1.8;margin-bottom:28px;">Tu suscripción ha sido suspendida.<br/>Tu información está segura.<br/>Contacta a soporte para reactivar.</div><a href="https://wa.me/521234567890?text=Hola,%20necesito%20reactivar%20mi%20PVI" target="_blank" style="display:inline-block;padding:13px 26px;background:#25D366;color:#fff;border-radius:11px;font-weight:700;text-decoration:none;margin-bottom:12px;">📲 Contactar soporte</a><br/><button onclick="doLogout()" style="background:none;border:none;color:#444;cursor:pointer;font-size:12px;text-decoration:underline;margin-top:8px;">Cerrar sesión</button></div></div>`;}

function renderSellSearch(){
  const d=D();const q=S.prodSearch;const el=G('srch-res');if(!el)return;
  if(!q){el.innerHTML='';return;}
  const r=S.prods.filter(p=>p.name.toLowerCase().includes(q.toLowerCase())||p.brand.toLowerCase().includes(q.toLowerCase())).slice(0,8);
  el.innerHTML=r.map(p=>`<div onclick="addToCart('${p.barcode}');S.prodSearch='';G('srch').value='';G('srch-res').innerHTML='';"
    style="padding:9px 11px;border-radius:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;"
    onmouseover="this.style.background='${d.hvr}'" onmouseout="this.style.background='transparent'">
    <div><div style="font-size:13px;font-weight:600;color:${d.fg};">${p.name} ${p.sellType==='bulk'?'<span style="color:#00b4d8;font-size:10px;">(⚖️ kg)</span>':''}</div>
    <div style="font-size:10px;color:${d.sub};">${p.brand} · ${p.dept} · Stock: ${p.stock}${p.sellType==='bulk'?' kg':''}</div></div>
    <div style="color:#00e5a0;font-weight:700;font-size:14px;">${f$(p.price)}${p.sellType==='bulk'?'/kg':''}</div>
  </div>`).join('');
}

function rChg(){
  const paid=parseFloat(G('paid-inp')?.value||0),t=cartTotal();
  const box=G('chg-box'),val=G('chg-val');if(!box||!val)return;
  if(paid>=t&&paid>0){box.style.display='flex';val.textContent=f$(Math.max(0,paid-t));}
  else box.style.display='none';
}

function htmlProds(){
  const d=D();
  let prods=[...S.prods];
  // Filtro búsqueda
  if(S.prodSearch)prods=prods.filter(p=>p.name.toLowerCase().includes(S.prodSearch.toLowerCase())||p.barcode.includes(S.prodSearch)||p.brand.toLowerCase().includes(S.prodSearch.toLowerCase())||p.dept.toLowerCase().includes(S.prodSearch.toLowerCase()));
  // Filtro departamento
  if(S.prodFilterDept!=='all')prods=prods.filter(p=>p.dept===S.prodFilterDept);
  // Orden
  prods.sort((a,b)=>{
    let va,vb;
    if(S.prodSort==='name'){va=a.name||'';vb=b.name||'';}
    else if(S.prodSort==='stock'){va=a.stock||0;vb=b.stock||0;}
    else if(S.prodSort==='profit'){va=(a.price||0)-(a.cost||0);vb=(b.price||0)-(b.cost||0);}
    else if(S.prodSort==='brand'){va=a.brand||'';vb=b.brand||'';}
    else if(S.prodSort==='dept'){va=a.dept||'';vb=b.dept||'';}
    else{va=a.price||0;vb=b.price||0;}
    const cmp=typeof va==='string'?(va||'').localeCompare(vb||''):(va||0)-(vb||0);
    return S.prodSortDir==='asc'?cmp:-cmp;
  });

  return`
  <!-- Barra de herramientas -->
  <div style="${crd()}padding:10px 12px;">
    <div style="display:flex;gap:7px;margin-bottom:9px;">
      <input id="prod-srch" value="${S.prodSearch}" oninput="S.prodSearch=this.value;render()"
        placeholder="🔍 Buscar por nombre, marca, código o departamento..." style="${IS()}flex:1;"/>
      <button onclick="openNewProd()" class="bp" style="padding:10px 15px;white-space:nowrap;font-size:12px;">+ Nuevo</button>
      <button onclick="S.scanner=true;S.scanForAdd=true;render()" style="${BS(S.dark?'#1a3a2a':'#e0f5ed')};padding:10px 13px;font-size:19px;color:#00e5a0;">📷</button>
    </div>
    <!-- Filtros de orden -->
    <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;">
      <span style="color:${d.sub};font-size:11px;font-weight:600;">Ordenar:</span>
      ${[['name','Nombre'],['stock','Existencia'],['profit','Utilidad'],['brand','Marca'],['dept','Departamento'],['price','Precio']].map(([k,lbl])=>`
      <button onclick="if(S.prodSort==='${k}')S.prodSortDir=S.prodSortDir==='asc'?'desc':'asc';else{S.prodSort='${k}';S.prodSortDir='asc';}render()"
        style="padding:5px 10px;border-radius:7px;border:1.5px solid ${S.prodSort===k?'#00e5a0':D().brd};background:${S.prodSort===k?(S.dark?'rgba(0,229,160,0.1)':'rgba(0,180,130,0.08)'):'transparent'};color:${S.prodSort===k?'#00e5a0':D().sub};cursor:pointer;font-size:11px;font-weight:${S.prodSort===k?700:400};font-family:'DM Sans',sans-serif;">
        ${lbl}${S.prodSort===k?(S.prodSortDir==='asc'?' ↑':' ↓'):''}
      </button>`).join('')}
    </div>
    <div style="margin-top:8px;display:flex;gap:5px;flex-wrap:wrap;align-items:center;">
      <span style="color:${d.sub};font-size:11px;font-weight:600;">Dpto:</span>
      <button onclick="S.prodFilterDept='all';render()" style="padding:4px 9px;border-radius:6px;border:1.5px solid ${S.prodFilterDept==='all'?'#00b4d8':D().brd};background:${S.prodFilterDept==='all'?(S.dark?'rgba(0,180,216,0.1)':'rgba(0,130,200,0.08)'):'transparent'};color:${S.prodFilterDept==='all'?'#00b4d8':D().sub};cursor:pointer;font-size:10px;font-weight:${S.prodFilterDept==='all'?700:400};font-family:'DM Sans',sans-serif;">Todos</button>
      ${DEPTS.slice(1).map(dept=>`<button onclick="S.prodFilterDept=S.prodFilterDept==='${dept}'?'all':'${dept}';render()"
        style="padding:4px 9px;border-radius:6px;border:1.5px solid ${S.prodFilterDept===dept?'#00b4d8':D().brd};background:${S.prodFilterDept===dept?(S.dark?'rgba(0,180,216,0.1)':'rgba(0,130,200,0.08)'):'transparent'};color:${S.prodFilterDept===dept?'#00b4d8':D().sub};cursor:pointer;font-size:10px;font-weight:${S.prodFilterDept===dept?700:400};font-family:'DM Sans',sans-serif;">${dept}</button>`).join('')}
    </div>
  </div>

  <div style="color:${d.sub};font-size:11px;margin-bottom:8px;">${prods.length} de ${S.prods.length} productos</div>

  <!-- Lista de productos -->
  ${prods.map(p=>{
    const expSt=expStatus(p);const profit=p.price-p.cost;
    return`<div style="${crd()}padding:11px 13px;cursor:pointer;" onclick="S.prodModal={mode:'view',prod:{...${JSON.stringify(p).replace(/"/g,'&quot;')}},searching:false};render()">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div style="flex:1;min-width:0;">
          <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:2px;">
            <span style="font-weight:700;font-size:13px;color:${d.fg};">${p.name}</span>
            ${p.highRotation?`<span style="background:rgba(255,165,0,0.2);color:#ffa500;font-size:9px;font-weight:700;padding:1px 5px;border-radius:10px;">🔥</span>`:''}
            ${p.sellType==='bulk'?`<span style="background:rgba(0,180,216,0.2);color:#00b4d8;font-size:9px;font-weight:700;padding:1px 5px;border-radius:10px;">⚖️ kg</span>`:''}
            ${p.sellType==='kit'?`<span style="background:rgba(150,100,255,0.2);color:#9664ff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:10px;">📦 kit</span>`:''}
          </div>
          <div style="font-size:10px;color:${d.sub};">${p.brand} · ${p.dept} · <span style="font-family:'DM Mono',monospace;">${p.barcode}</span></div>
          ${expSt?`<div style="font-size:10px;color:${expSt.color};margin-top:1px;">⏰ ${expSt.label}</div>`:''}
        </div>
        <div style="text-align:right;flex-shrink:0;margin-left:8px;">
          <div style="${TG(p.stock===0?'#ff4444':p.useStock&&p.min>0&&p.stock<=p.min?'#ff8844':'#00e5a0')};display:block;margin-bottom:4px;">${p.stock}${p.sellType==='bulk'?' kg':' pzas'}</div>
          <div style="font-weight:700;color:#00e5a0;font-size:13px;">${f$(p.price)}</div>
        </div>
      </div>
      <div style="display:flex;gap:10px;font-size:11px;margin-top:7px;">
        <span style="color:${d.sub};">Costo: <b style="color:${d.fg};">${f$(p.cost)}</b></span>
        <span style="color:${d.sub};">Util: <b style="color:#00b4d8;">${f$(profit)} (${p.cost>0?(profit/p.cost*100).toFixed(0):p.margin}%)</b></span>
        ${p.priceWholesale>0?`<span style="color:${d.sub};">Mayor: <b style="color:${d.fg};">${f$(p.priceWholesale)}</b></span>`:''}
      </div>
    </div>`;
  }).join('')}
  ${prods.length===0?`<div style="text-align:center;padding:52px 20px;color:${d.sub};"><div style="font-size:52px;margin-bottom:12px;">📦</div><div style="font-size:15px;">Sin productos${S.prodSearch?' que coincidan':''}.</div><button onclick="openNewProd()" class="bp" style="margin-top:16px;padding:11px 22px;">+ Agregar primero</button></div>`:''}
  ${S.prodModal?htmlProdModal():''}`;
}

  </div></div>`;
}

function autoPriceCalc(){
  const cost=parseFloat(S.prodModal?.prod?.cost||0);
  const margin=parseFloat(S.prodModal?.prod?.margin||0);
  if(cost>0&&margin>0){S.prodModal.prod.price=+(cost*(1+margin/100)).toFixed(2);}
  render();
}

// SECCIÓN: CORTE DEL DÍA
// ══════════════════════════════════════════════════════════
function htmlCut(){
  const d=D();
  const todaySales=S.sales.filter(s=>s.date===today());
  const active=todaySales.filter(s=>!s.cancelled);
  const rev=active.reduce((s,v)=>s+v.total,0);
  const profit=active.reduce((s,v)=>s+v.profit,0);
  const byM={cash:0,card:0,transfer:0};active.forEach(s=>{byM[s.payMethod]=(byM[s.payMethod]||0)+s.total;});
  const byCaja={};active.forEach(s=>{const n=s.cashierName||'Caja 1';if(!byCaja[n])byCaja[n]={rev:0,profit:0,count:0};byCaja[n].rev+=s.total;byCaja[n].profit+=s.profit;byCaja[n].count++;});
  const cuts=[...getCuts()];
  return`
  <!-- Resumen del día -->
  <div style="${crd()}background:${S.dark?'linear-gradient(135deg,rgba(0,229,160,0.07),rgba(0,180,216,0.07))':'linear-gradient(135deg,rgba(0,229,160,0.04),rgba(0,180,216,0.04))'};border:1px solid rgba(0,229,160,0.18);">
    <div style="color:${d.sub};font-size:12px;margin-bottom:10px;font-weight:700;">📅 HOY — ${new Date().toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long'})}</div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;">
      ${[['Ventas',active.length,d.fg],['Ingresos',f$(rev),'#00b4d8'],['Ganancia',f$(profit),'#00e5a0'],['Canceladas',todaySales.filter(s=>s.cancelled).length,'#ff6b6b']].map(([l,v,c])=>`<div style="text-align:center;padding:8px;background:${S.dark?'rgba(0,0,0,0.2)':'rgba(255,255,255,0.7)'};border-radius:9px;"><div style="color:${c};font-size:19px;font-weight:900;">${v}</div><div style="color:${d.sub};font-size:9px;margin-top:3px;">${l}</div></div>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;">

    </div>
    ${Object.keys(byCaja).length>0?`<div style="margin-bottom:14px;">${Object.entries(byCaja).map(([name,data])=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 10px;background:${S.dark?'rgba(255,255,255,0.03)':'rgba(255,255,255,0.7)'};border-radius:8px;margin-bottom:5px;"><div style="font-size:12px;font-weight:600;color:${d.fg};">${name}</div><div style="display:flex;gap:16px;font-size:12px;"><span style="color:${d.sub};">${data.count} ventas</span><span style="color:#00b4d8;">${f$(data.rev)}</span><span style="color:#00e5a0;font-weight:700;">${f$(data.profit)}</span></div></div>`).join('')}</div>`:''}

}

// SECCIÓN: REPORTES
// ══════════════════════════════════════════════════════════
function htmlReports(){
  const d=D();
  const allFilt=filterPeriod(S.sales,S.repPeriod);
  const cajaFilt=S.repCajaFilter==='all'?allFilt:allFilt.filter(s=>s.cashierName===S.repCajaFilter);
  const active=cajaFilt.filter(s=>!s.cancelled);
  const rev=active.reduce((s,v)=>s+v.total,0),prf=active.reduce((s,v)=>s+v.profit,0);
  const byM={cash:0,card:0,transfer:0};active.forEach(s=>{byM[s.payMethod]=(byM[s.payMethod]||0)+s.total;});
  const byCaja={};allFilt.filter(s=>!s.cancelled).forEach(s=>{const n=s.cashierName||'Caja 1';if(!byCaja[n])byCaja[n]={rev:0,profit:0,count:0};byCaja[n].rev+=s.total;byCaja[n].profit+=s.profit;byCaja[n].count++;});
  // Top 10
  const prodSales={};active.flatMap(s=>s.items).forEach(i=>{if(!prodSales[i.barcode])prodSales[i.barcode]={name:i.name,qty:0,rev:0};prodSales[i.barcode].qty+=(i.qty??i.weight??0);prodSales[i.barcode].rev+=i.price*(i.qty??i.weight??0);});
  const top10=Object.values(prodSales).sort((a,b)=>b.qty-a.qty).slice(0,10);
  // Gráfica
  const last7=[...Array(7)].map((_,i)=>{const dt=new Date();dt.setDate(dt.getDate()-i);const ds=dt.toISOString().split('T')[0];const day=S.sales.filter(s=>s.date===ds&&!s.cancelled&&(S.repCajaFilter==='all'||s.cashierName===S.repCajaFilter));return{label:i===0?'Hoy':dt.toLocaleDateString('es-MX',{weekday:'short'}),rev:day.reduce((s,v)=>s+v.total,0),profit:day.reduce((s,v)=>s+v.profit,0)};}).reverse();
  const maxR=Math.max(...last7.map(x=>x.rev),1);
  const PL={day:'Hoy',week:'Esta semana',month:'Este mes',year:'Este año'};
  const cajaLabel=S.repCajaFilter==='all'?'General':S.repCajaFilter;
  const c=C();
  return`
  <div style="${crd()}padding:10px 12px;">
    <div style="display:flex;gap:10px;flex-wrap:wrap;">
      <div style="flex:1;min-width:160px;">
        <div style="color:${d.sub};font-size:11px;margin-bottom:6px;font-weight:600;">PERIODO</div>
        <div style="display:flex;gap:5px;">${[['day','Hoy'],['week','Semana'],['month','Mes'],['year','Año']].map(([id,lbl])=>`<button onclick="S.repPeriod='${id}';render()" style="flex:1;padding:7px 4px;border-radius:7px;border:2px solid ${S.repPeriod===id?'#00e5a0':d.brd};background:${S.repPeriod===id?(S.dark?'rgba(0,229,160,0.1)':'rgba(0,180,130,0.07)'):'transparent'};color:${S.repPeriod===id?'#00e5a0':d.sub};cursor:pointer;font-size:11px;font-weight:${S.repPeriod===id?700:400};font-family:'DM Sans',sans-serif;">${lbl}</button>`).join('')}</div>
      </div>
      <div style="flex:1;min-width:160px;">
        <div style="color:${d.sub};font-size:11px;margin-bottom:6px;font-weight:600;">CAJA</div>
        <div style="display:flex;gap:5px;">${['all','1','2','3'].map(n=>{const name=n==='all'?'Todas':(c[`caja${n}Name`]||`C${n}`).slice(0,5);const key=n==='all'?'all':c[`caja${n}Name`]||`Caja ${n}`;return`<button onclick="S.repCajaFilter='${key}';render()" style="flex:1;padding:7px 4px;border-radius:7px;border:2px solid ${S.repCajaFilter===key?'#00b4d8':d.brd};background:${S.repCajaFilter===key?(S.dark?'rgba(0,180,216,0.1)':'rgba(0,130,200,0.07)'):'transparent'};color:${S.repCajaFilter===key?'#00b4d8':d.sub};cursor:pointer;font-size:10px;font-weight:700;font-family:'DM Sans',sans-serif;">${name}</button>`;}).join('')}</div>
      </div>
    </div>
  </div>

  <div style="${crd()}background:${S.dark?'linear-gradient(135deg,rgba(0,229,160,0.07),rgba(0,180,216,0.07))':'linear-gradient(135deg,rgba(0,229,160,0.04),rgba(0,180,216,0.04))'};border:1px solid rgba(0,229,160,0.18);">
    <div style="color:${d.sub};font-size:11px;margin-bottom:9px;font-weight:600;">📊 ${PL[S.repPeriod]} · ${cajaLabel}</div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;">
      ${[['Ventas',active.length,d.fg],['Ingresos',f$(rev),'#00b4d8'],['Ganancia',f$(prf),'#00e5a0'],['Canceladas',cajaFilt.filter(s=>s.cancelled).length,'#ff6b6b']].map(([l,v,c2])=>`<div style="text-align:center;padding:8px;background:${S.dark?'rgba(0,0,0,0.2)':'rgba(255,255,255,0.6)'};border-radius:9px;"><div style="color:${c2};font-size:18px;font-weight:900;">${v}</div><div style="color:${d.sub};font-size:9px;margin-top:3px;">${l}</div></div>`).join('')}
    </div>
  </div>
  <div style="${crd()}">
    <div style="color:${d.sub};font-size:11px;font-weight:700;margin-bottom:10px;">💳 Por forma de pago</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;">
      ${PAYMENTS.map(m=>`<div style="text-align:center;padding:10px 6px;border-radius:10px;background:${S.dark?'rgba(255,255,255,0.03)':'rgba(0,0,0,0.02)'};border:1px solid ${d.brd};"><div style="font-size:20px;margin-bottom:3px;">${m.icon}</div><div style="color:#00e5a0;font-weight:800;font-size:13px;">${f$(byM[m.id]||0)}</div><div style="color:${d.sub};font-size:10px;">${m.label}</div></div>`).join('')}
    </div>
  </div>
  ${Object.keys(byCaja).length>0?`<div style="${crd()}"><div style="color:${d.sub};font-size:11px;font-weight:700;margin-bottom:10px;">🏪 Por caja</div>
  ${Object.entries(byCaja).map(([name,data],i,arr)=>`<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:7px;padding-bottom:7px;border-bottom:${i<arr.length-1?`1px solid ${d.brd}`:'none'};"><div style="font-weight:700;color:${d.fg};font-size:12px;align-self:center;">${name}</div><div style="text-align:center;"><div style="font-size:13px;font-weight:700;color:${d.fg};">${data.count}</div><div style="font-size:9px;color:${d.sub};">ventas</div></div><div style="text-align:center;"><div style="font-size:13px;font-weight:700;color:#00b4d8;">${f$(data.rev)}</div><div style="font-size:9px;color:${d.sub};">ingresos</div></div><div style="text-align:center;"><div style="font-size:13px;font-weight:700;color:#00e5a0;">${f$(data.profit)}</div><div style="font-size:9px;color:${d.sub};">ganancia</div></div></div>`).join('')}
  </div>`:''}
  <div style="${crd()}"><div style="color:${d.sub};font-size:11px;font-weight:700;margin-bottom:10px;">📈 Últimos 7 días</div>
    <div style="display:flex;align-items:flex-end;gap:5px;height:110px;">
      ${last7.map(day=>`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;">${day.rev>0?`<div style="font-size:7px;color:#00e5a0;font-weight:700;">${f$(day.profit)}</div>`:''}<div style="width:100%;display:flex;flex-direction:column;gap:2px;align-items:center;"><div style="width:75%;background:rgba(0,229,160,0.75);border-radius:3px 3px 0 0;min-height:${day.profit>0?2:0}px;height:${(day.profit/maxR)*85}px;"></div><div style="width:75%;background:rgba(0,180,216,0.28);border-radius:0 0 3px 3px;min-height:${day.rev>0?2:0}px;height:${(day.rev/maxR)*85}px;"></div></div><div style="font-size:8px;color:${d.sub};text-align:center;">${day.label}</div></div>`).join('')}
    </div>
  </div>
  <div style="${crd()}"><div style="color:${d.sub};font-size:11px;font-weight:700;margin-bottom:10px;">🏆 Top 10 más vendidos</div>
    ${top10.length===0?`<div style="color:${d.sub};">Sin ventas en este periodo.</div>`:
    top10.map((p2,i)=>`<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;padding-bottom:8px;border-bottom:${i<9?`1px solid ${d.brd}`:'none'};"><div style="width:26px;height:26px;background:${i===0?'#ffd700':i===1?'#c0c0c0':i===2?'#cd7f32':S.dark?'#1e1e30':'#eee'};border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:11px;color:${i<3?'#000':d.sub};flex-shrink:0;">${i+1}</div><div style="flex:1;min-width:0;"><div style="font-size:12px;font-weight:600;color:${d.fg};">${p2.name}</div><div style="font-size:10px;color:${d.sub};">${p2.qty.toFixed(1)} unidades · ${f$(p2.rev)}</div></div></div>`).join('')}
  </div>`;
}

        <div><div style="color:${d.sub};font-size:11px;margin-bottom:4px;">PIN Caja 3</div><input type="text" id="cfg-pin3" value="${c.pin3||''}" maxlength="6" oninput="S.cfgEdit['pin3']=this.value" style="${IS()}font-family:'DM Mono',monospace;font-size:18px;letter-spacing:4px;text-align:center;"/></div>

  </div>`;
}

function htmlModals(){
  const d=D();let h='';

  // Escáner
  if(S.scanner){
    const onScan=S.scanForAdd?'SDA':'SD';
    h+=`<div style="position:fixed;inset:0;background:rgba(0,0,0,0.96);z-index:3000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:18px;">
    <div style="color:#00e5a0;font-size:13px;text-align:center;font-weight:600;">📷 ${S.scanForAdd?'Escanea el código del producto':'Apunta al código de barras'}</div>

      <div style="text-align:center;margin-bottom:14px;"><div style="font-size:38px;margin-bottom:7px;">⚖️</div>

        onkeydown="if(event.key==='Enter')addByWeight(S.weightModal,S.weightInput)" autofocus/>
      ${S.weightInput&&parseFloat(S.weightInput)>0?`<div style="text-align:center;color:#00e5a0;font-weight:700;font-size:17px;margin-bottom:12px;">Total: ${f$(parseFloat(S.weightInput)*p.price)}</div>`:''}
      <div style="display:flex;gap:8px;">
        <button onclick="S.weightModal=null;S.weightInput='';render()" style="${BS(S.dark?'#1e1e3a':'#f0f0f8',d.sub)};flex:1;padding:11px;">Cancelar</button>
        <button onclick="addByWeight(S.weightModal,S.weightInput)" class="bp" style="flex:2;padding:11px;font-size:14px;">⚖️ Agregar</button>
      </div>

      <div style="font-size:44px;text-align:center;margin-bottom:12px;">⚠️</div>

  if(S.receipt){const r=S.receipt;const pm=PAYMENTS.find(m=>m.id===r.payMethod);

      <div style="color:#00e5a0;font-weight:900;font-size:19px;">¡Venta completada!</div>
      <div style="color:${d.sub};font-size:11px;margin-top:2px;">${C().storeName} · ${S.cashier}</div></div>

        <div style="display:flex;justify-content:space-between;font-weight:900;font-size:19px;color:${d.fg};"><span>Total</span><span style="color:#00e5a0;">${f$(r.total)}</span></div>
        <div style="display:flex;justify-content:space-between;font-size:13px;"><span style="color:${d.sub};">Pago</span><span>${pm?.icon} ${pm?.label}</span></div>
        ${r.payMethod==='cash'?`<div style="display:flex;justify-content:space-between;font-size:13px;"><span style="color:${d.sub};">Pagó</span><span>${f$(r.paid)}</span></div>${r.change>0?`<div style="display:flex;justify-content:space-between;font-size:13px;"><span style="color:${d.sub};">Cambio</span><span style="color:#ffa500;font-weight:700;">${f$(r.change)}</span></div>`:''}`:''}
        <div style="background:rgba(0,229,160,0.08);border-radius:9px;padding:9px 12px;margin-top:3px;"><div style="display:flex;justify-content:space-between;font-size:13px;"><span style="color:${d.sub};">Ganancia</span><span style="color:#00e5a0;font-weight:900;font-size:15px;">+${f$(r.profit)}</span></div></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:16px;">
        <button onclick="printTicket(S.receipt)" style="${BS(S.dark?'#1a1a30':'#f0f2ff',S.dark?'#aaa':'#555')};padding:10px;font-size:12px;display:flex;align-items:center;justify-content:center;gap:4px;">🖨️ Imprimir</button>
        <button onclick="S.whatsModal=S.receipt;render()" style="${BS('#25D366','#fff')};padding:10px;font-size:12px;display:flex;align-items:center;justify-content:center;gap:4px;">📲 WhatsApp</button>
      </div>
      <button onclick="S.receipt=null;render()" class="bp" style="width:100%;padding:13px;font-size:15px;margin-top:7px;">+ Nueva venta</button>
    </div></div>`;
  }

  // WhatsApp
  if(S.whatsModal){
    h+=`<div style="position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:1100;display:flex;align-items:center;justify-content:center;padding:14px;">
    <div style="background:${S.dark?'#111':d.bg};border:1px solid rgba(37,211,102,0.35);border-radius:20px;padding:24px;width:100%;max-width:340px;">
      <div style="font-size:38px;text-align:center;margin-bottom:9px;">📲</div>
      <div style="font-weight:900;font-size:17px;color:${d.fg};text-align:center;margin-bottom:4px;">Enviar ticket</div>
      <div style="color:${d.sub};font-size:11px;text-align:center;margin-bottom:14px;">El número no queda guardado.</div>
      <input id="wn" type="tel" maxlength="10" value="${S.whatsNum}" oninput="S.whatsNum=this.value.replace(/\\D/g,'').slice(0,10);this.value=S.whatsNum;"
        placeholder="5512345678" style="${IS()}font-family:'DM Mono',monospace;font-size:18px;letter-spacing:3px;text-align:center;margin-bottom:13px;"
        onkeydown="if(event.key==='Enter'&&S.whatsNum.length===10)sendWA(S.whatsModal,S.whatsNum)"/>
      <div style="display:flex;gap:8px;">
        <button onclick="S.whatsModal=null;S.whatsNum='';S.receipt=null;render()" style="${BS(S.dark?'#1e1e3a':'#f0f0f8',d.sub)};flex:1;padding:12px;">Omitir</button>
        <button onclick="if(S.whatsNum.length===10)sendWA(S.whatsModal,S.whatsNum);else notify('10 dígitos requeridos','err');" style="${BS('#25D366','#fff')};flex:2;display:flex;align-items:center;justify-content:center;gap:7px;padding:12px;">📲 Enviar</button>
      </div>
    </div></div>`;
  }

  // Cancelar venta
  if(S.cancelModal){const s=S.cancelModal;
    h+=`<div style="position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:1200;display:flex;align-items:center;justify-content:center;padding:14px;">
    <div style="background:${S.dark?'#111':d.bg};border:1px solid rgba(255,107,107,0.4);border-radius:20px;padding:24px;width:100%;max-width:390px;">
      <div style="text-align:center;margin-bottom:18px;"><div style="font-size:46px;margin-bottom:8px;">⛔</div>
      <div style="color:#ff6b6b;font-weight:900;font-size:19px;">Cancelar venta</div>
      <div style="color:${d.sub};font-size:12px;margin-top:3px;">Solo puedes cancelar tus propias ventas · El stock se restaura automáticamente</div></div>
      <div style="background:${S.dark?'rgba(255,255,255,0.03)':'#f8f8f8'};border:1px solid ${d.brd};border-radius:10px;padding:11px;margin-bottom:14px;">
        ${s.items.map(it=>{const q=it.qty!=null?`×${it.qty}`:fkg(it.weight);return`<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:2px;color:${d.fg};"><span>${it.name} ${q}</span><span>${f$(it.price*(it.qty??it.weight))}</span></div>`;}).join('')}
        <div style="border-top:1px solid ${d.brd};margin-top:7px;padding-top:7px;display:flex;justify-content:space-between;font-weight:700;"><span style="color:${d.fg};">Total</span><span style="color:#ff6b6b;font-size:15px;">${f$(s.total)}</span></div>
      </div>
      <div style="margin-bottom:12px;"><div style="color:${d.sub};font-size:11px;margin-bottom:5px;">Motivo *</div>
      <select id="cr" style="${IS()}"><option value="">Selecciona...</option><option>Cliente desistió</option><option>Pago rechazado</option><option>Producto no disponible</option><option>Error en cobro</option><option>Otro</option></select></div>
      <div style="margin-bottom:14px;"><div style="color:${d.sub};font-size:11px;margin-bottom:5px;">🔑 Contraseña *</div>
      ${PwInput('cp','cancel','Contraseña para autorizar','CC()')}
      <div id="ce" style="display:none;color:#ff6b6b;font-size:11px;margin-top:5px;"></div></div>
      <div style="display:flex;gap:8px;">
        <button onclick="S.cancelModal=null;render()" style="${BS(S.dark?'#1e1e3a':'#f0f0f8',d.sub)};flex:1;padding:12px;">Volver</button>
        <button onclick="CC()" style="${BS('#ff6b6b','#fff')};flex:2;padding:12px;font-size:14px;">⛔ Confirmar</button>
      </div>
    </div></div>`;
  }

  // Notificación
  if(S.notif)h+=`<div style="position:fixed;top:68px;left:50%;transform:translateX(-50%);background:${S.notif.type==='err'?'#ff6b6b':'#00e5a0'};color:#000;padding:9px 20px;border-radius:11px;font-weight:700;font-size:13px;z-index:9999;white-space:nowrap;box-shadow:0 5px 22px rgba(0,0,0,0.5);animation:fadeUp .2s ease;">${S.notif.msg}</div>`;
  return h;
}

// ══════════════════════════════════════════════════════════
// RENDER PRINCIPAL
// ══════════════════════════════════════════════════════════
function render(){
  const d=D();const root=G('root');const c=C();
  document.body.style.background=d.bg;
  if(S.screen==='login'){root.innerHTML=rLogin()+htmlModals();return;}
  if(S.screen==='blocked'){root.innerHTML=rBlocked();return;}
  // Restringir tabs para cajas 2 y 3
  if(!isCaja1()&&S.tab!=='sell')S.tab='sell';
  const content=S.tab==='sell'?htmlSell():S.tab==='prods'?htmlProds():S.tab==='inventory'?htmlInventory():S.tab==='cfg'?htmlCfg():S.tab==='cut'?htmlCut():htmlReports();
  const alerts=lowStock().length+nearExp().length;
  const todayPrf=()=>S.sales.filter(s=>s.date===today()&&!s.cancelled&&s.cashierName===S.cashier).reduce((s,v)=>s+v.profit,0);

  // Tabs del menú — orden y labels como pidió Juan
  const TABS=[
    {id:'sell',ico:'🛒',lbl:'Ventas',always:true},
    {id:'prods',ico:'📦',lbl:'Productos',caja1:true},
    {id:'inventory',ico:'📋',lbl:'Inventario',caja1:true},
    {id:'cfg',ico:'⚙️',lbl:'Config',caja1:true},
    {id:'cut',ico:'📅',lbl:'Corte',caja1:true},
    {id:'reports',ico:'📊',lbl:'Reportes',caja1:true},
  ].filter(t=>t.always||isCaja1());

  const sbBtn=t=>`<button onclick="ST('${t.id}')" style="width:100%;padding:10px 12px;border:none;border-radius:9px;background:${S.tab===t.id?(S.dark?'rgba(0,229,160,0.12)':'rgba(0,180,130,0.1)'):'transparent'};color:${S.tab===t.id?'#00e5a0':d.sub};cursor:pointer;display:flex;align-items:center;gap:9px;font-size:13px;font-weight:${S.tab===t.id?700:500};margin-bottom:3px;font-family:'DM Sans',sans-serif;text-align:left;"><span style="font-size:18px;">${t.ico}</span>${t.lbl}</button>`;
  const nbBtn=t=>`<button onclick="ST('${t.id}')" style="flex:1;padding:8px 2px;background:none;border:none;color:${S.tab===t.id?'#00e5a0':d.sub};font-size:9px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:1px;font-weight:${S.tab===t.id?700:400};border-top:${S.tab===t.id?'2px solid #00e5a0':'2px solid transparent'};font-family:'DM Sans',sans-serif;"><span style="font-size:19px;">${t.ico}</span>${t.lbl}</button>`;

  root.innerHTML=`
  <!-- MÓVIL -->
  <div class="mob-wrap" style="background:${d.bg};color:${d.fg};">
    <div class="mob-hdr" style="background:${d.hdr};border-bottom:1px solid ${d.brd};">
      <div><div style="font-weight:900;font-size:13px;">${c.storeName}</div><div style="font-size:9px;color:${d.sub};">${S.cashier}</div></div>
      <div style="display:flex;align-items:center;gap:7px;">
        ${alerts>0?`<div style="background:#ff4444;color:#fff;font-size:9px;font-weight:800;padding:2px 6px;border-radius:20px;cursor:pointer;" onclick="ST('inventory')">🔴${alerts}</div>`:''}
        <div style="text-align:right;margin-right:1px;"><div style="color:#00e5a0;font-weight:800;font-size:12px;">${f$(todayPrf())}</div><div style="font-size:8px;color:${d.sub};">mi ganancia</div></div>
        <button onclick="S.dark=!S.dark;render()" style="background:${S.dark?'rgba(255,255,255,0.07)':'rgba(0,0,0,0.07)'};border:1px solid ${d.brd};color:${d.fg};border-radius:7px;padding:5px 8px;cursor:pointer;font-size:14px;">${S.dark?'☀️':'🌙'}</button>
        <button onclick="doLogout()" style="background:${S.dark?'rgba(255,255,255,0.04)':'rgba(0,0,0,0.04)'};border:1px solid ${d.brd};color:${d.sub};border-radius:7px;padding:5px 8px;cursor:pointer;font-size:11px;">Salir</button>
      </div>
    </div>
    <div class="mob-cnt">${content}</div>
    <div class="mob-nav" style="background:${d.hdr};border-top:1px solid ${d.brd};">${TABS.map(nbBtn).join('')}</div>
  </div>

  <!-- PC -->
  <div class="pc-wrap" style="background:${d.bg};color:${d.fg};">
    <div class="pc-sidebar" style="background:${d.sb};border-right:1px solid ${d.brd};">
      <div style="padding:18px 16px 14px;">
        <div style="width:44px;height:44px;background:linear-gradient(135deg,#00e5a0,#00b4d8);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:10px;">🏪</div>
        <div style="font-weight:900;font-size:13px;color:${d.fg};line-height:1.2;">${c.storeName}</div>
        <div style="font-size:10px;color:${d.sub};margin-top:2px;">${S.cashier}</div>
      </div>
      <div style="padding:0 10px;flex:1;">${TABS.map(sbBtn).join('')}</div>
      <div style="padding:14px 16px;border-top:1px solid ${d.brd};">
        ${alerts>0?`<div style="background:rgba(255,68,68,0.1);border:1px solid rgba(255,68,68,0.25);border-radius:7px;padding:7px 10px;margin-bottom:9px;cursor:pointer;" onclick="ST('inventory')"><div style="color:#ff4444;font-size:11px;font-weight:700;">🔴 ${alerts} alerta(s)</div></div>`:''}
        <div style="margin-bottom:9px;"><div style="color:#00e5a0;font-weight:900;font-size:16px;">${f$(todayPrf())}</div><div style="font-size:9px;color:${d.sub};">mi ganancia hoy</div></div>
        <div style="display:flex;gap:5px;">
          <button onclick="S.dark=!S.dark;render()" style="flex:1;padding:7px;background:${S.dark?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.05)'};border:1px solid ${d.brd};color:${d.fg};border-radius:7px;cursor:pointer;font-size:14px;">${S.dark?'☀️':'🌙'}</button>
          <button onclick="doLogout()" style="flex:2;padding:7px;background:transparent;border:1px solid ${d.brd};color:${d.sub};border-radius:7px;cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif;">Salir</button>
        </div>
      </div>
    </div>
    <div class="pc-main">
      <div class="pc-topbar" style="background:${d.hdr};border-bottom:1px solid ${d.brd};">
        <div style="font-weight:700;font-size:17px;color:${d.fg};">${{sell:'🛒 Ventas',prods:'📦 Productos',inventory:'📋 Inventario',cfg:'⚙️ Configuración',cut:'📅 Corte del Día',reports:'📊 Reportes'}[S.tab]||'🛒 Ventas'}</div>
        <div style="font-size:11px;color:${d.sub};">${new Date().toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long'})}</div>
      </div>
      <div class="pc-content" style="max-width:880px;">${content}</div>
    </div>
  </div>
  ${htmlModals()}`;

  setTimeout(()=>{
    const s=G('srch');if(s&&S.prodSearch){s.value=S.prodSearch;renderSellSearch();}
  },0);
}

// ── Handlers globales ──────────────────────────────────────
window.ST=t=>{S.tab=t;S.prodModal=null;S.confirmModal=null;render();};
window.doLogout=doLogout;window.doLogin1=doLogin1;window.doLoginPin=doLoginPin;
window.addToCart=addToCart;window.addByWeight=addByWeight;window.finalizeSale=finalizeSale;
window.filterPeriod=filterPeriod;window.sendWA=sendWA;window.printTicket=printTicket;
window.printCut=printCut;window.printInventory=printInventory;
window.openNewProd=openNewProd;window.saveProd=saveProd;window.deleteProd=deleteProd;
window.searchOnline=searchOnline;window.autoPriceCalc=autoPriceCalc;
window.doCut=doCut;window.G=G;window.S=S;window.C=C;

window.CQ=(b,d)=>{const p=S.prods.find(p=>p.barcode===b);S.cart=S.cart.map(c=>{if(c.barcode!==b)return c;const nq=c.qty+d;if(nq<1)return c;if(p?.useStock&&nq>p.stock){notify('Sin suficiente existencia','err');return c;}return{...c,qty:nq};});render();};
window.AW=(b,d)=>{const p=S.prods.find(p=>p.barcode===b);S.cart=S.cart.map(c=>{if(c.barcode!==b)return c;const nw=+(c.weight+d).toFixed(3);if(nw<=0)return c;if(p?.useStock&&nw>p.stock){notify('Sin suficiente stock','err');return c;}return{...c,weight:nw};});render();};
window.RC=b=>{S.cart=S.cart.filter(c=>c.barcode!==b);render();};
window.SD=code=>{stopScanner();S.scanner=false;addToCart(code);render();};
window.SDA=code=>{stopScanner();S.scanner=false;S.scanForAdd=false;if(S.prodModal)S.prodModal.prod.barcode=code;else openNewProd(code);render();};
window.rChg=rChg;window.renderSellSearch=renderSellSearch;
window.CC=()=>{
  const reason=G('cr')?.value,pass=G('cp')?.value,e=G('ce');
  if(!reason){if(e){e.style.display='block';e.textContent='Selecciona un motivo.';}return;}
  if(pass!==C().password){if(e){e.style.display='block';e.textContent='Contraseña incorrecta.';}return;}
  cancelSale(S.cancelModal,reason);render();
};
window.saveCFG=()=>{
  const c=getCFG();const merged={...c,...S.cfgEdit};
  const passEl=G('cfg-pass');if(passEl&&passEl.value)merged.password=passEl.value;
  if(!merged.storeName){notify('Nombre del negocio requerido','err');return;}
  setCFG(merged);Object.assign(CFG_INIT,merged);S.cfgEdit={};notify('✓ Configuración guardada');render();
};

// Teclado
document.addEventListener('keydown',e=>{
  if(S.screen!=='pos')return;
  if(e.key==='Escape'){
    if(S.scanner){stopScanner();S.scanner=false;S.scanForAdd=false;render();return;}
    if(S.weightModal){S.weightModal=null;render();return;}
    if(S.confirmModal){S.confirmModal=null;render();return;}
    if(S.prodModal){S.prodModal=null;render();return;}
    if(S.receipt){S.receipt=null;render();return;}
    if(S.whatsModal){S.whatsModal=null;S.whatsNum='';render();return;}
    if(S.cancelModal){S.cancelModal=null;render();return;}
  }
  if(e.key==='F2'){e.preventDefault();ST('sell');}
  if(isCaja1()&&e.key==='F3'){e.preventDefault();ST('prods');}
  if(isCaja1()&&e.key==='F4'){e.preventDefault();ST('inventory');}
  if(isCaja1()&&e.key==='F5'){e.preventDefault();ST('cfg');}
  if(isCaja1()&&e.key==='F6'){e.preventDefault();ST('cut');}
  if(isCaja1()&&e.key==='F7'){e.preventDefault();ST('reports');}
});

// Init
S.prods=getProds();S.sales=getSales();S.cuts=getCuts();render();
</script>
</body>
</html>
