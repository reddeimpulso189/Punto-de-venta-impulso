// ── Auth ──────────────────────────────────────────────────
firebase.auth().onAuthStateChanged(async user=>{
  if(user){
    S.user=user; S.loading=true; render();
    const ps=await prodsRef().get();
    if(ps.exists()) S.prods=Object.values(ps.val());
    else{ const b={};BASE_PRODS.forEach(p=>b[p.barcode]=p);await prodsRef().set(b);S.prods=[...BASE_PRODS]; }
    const ss=await salesRef().get();
    S.sales=ss.exists()?Object.values(ss.val()):[];
    prodsRef().on('value',snap=>{if(snap.exists()){S.prods=Object.values(snap.val());render();}});
    salesRef().on('value',snap=>{S.sales=snap.exists()?Object.values(snap.val()):[];render();});
    S.loading=false;
  } else {
    S.user=null;
    prodsRef().off(); salesRef().off();
  }
  render();
});

  try{ await firebase.auth().signInWithEmailAndPassword(email,pass); S.cashier=cashier||'Caja 1'; }
  catch(e){ notify('Correo o contraseña incorrectos','err'); }
}

async function doLogout(){
  await firebase.auth().signOut();
  S.tab='sell';S.cart=[];render();
}

// ── Carrito ───────────────────────────────────────────────
function cartTotal()  { return S.cart.reduce((t,c)=>t+c.price*c.qty,0); }
function cartProfit() { return S.cart.reduce((t,c)=>t+(c.price-c.cost)*c.qty,0); }
function cartChange() { return S.paid?Math.max(0,parseFloat(S.paid)-cartTotal()):0; }

function addByBarcode(code){
  const p=S.prods.find(p=>p.barcode===code.trim());
  if(!p){notify('No encontrado: '+code,'err');return;}
  if(p.stock<=0){notify('Sin stock: '+p.name,'err');return;}
  const ex=S.cart.find(c=>c.barcode===p.barcode);
  if(ex){ if(ex.qty>=p.stock){notify('Sin suficiente existencia','err');return;}
    S.cart=S.cart.map(c=>c.barcode===p.barcode?{...c,qty:c.qty+1}:c);
  } else S.cart=[...S.cart,{...p,qty:1}];
  notify('✓ '+p.name);
}

async function finalizeSale(){
  if(!S.cart.length)return;
  const total=cartTotal(),profit=cartProfit();
  const sale={
    id:'s'+Date.now(),date:todayStr(),timestamp:Date.now(),
    items:[...S.cart],total,profit,
    paid:parseFloat(S.paid)||total,change:cartChange(),
    payMethod:S.payMethod,cashierName:S.cashier,
    cancelled:false,cancelledBy:null,cancelReason:null,
  };
  await salesRef().child(sale.id).set(sale);
  const upd={};
  S.prods.forEach(p=>{const it=S.cart.find(c=>c.barcode===p.barcode);if(it)upd[p.barcode]={...p,stock:p.stock-it.qty};});
  await prodsRef().update(upd);
  S.cart=[];S.paid='';S.payMethod='cash';S.receipt=sale;render();
}

async function cancelSale(sale,reason){
  const upd={};
  S.prods.forEach(p=>{const it=sale.items.find(i=>i.barcode===p.barcode);if(it)upd[p.barcode]={...p,stock:p.stock+it.qty};});
  await prodsRef().update(upd);
  await salesRef().child(sale.id).set({...sale,cancelled:true,cancelledBy:S.cashier,cancelReason:reason,cancelledAt:Date.now()});
  S.cancelModal=null;notify('⛔ Venta cancelada — stock restaurado');
}

// ── Filtro periodo ────────────────────────────────────────
function filterPeriod(sales,period){
  const now=new Date();
  return sales.filter(v=>{
    const d=new Date(v.timestamp);
    if(period==='day')  return v.date===todayStr();
    if(period==='week') {const s=new Date(now);s.setDate(now.getDate()-now.getDay());s.setHours(0,0,0,0);return d>=s;}
    if(period==='month')return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    if(period==='year') return d.getFullYear()===now.getFullYear();
    return true;
  });
}

// ── Escáner ───────────────────────────────────────────────
let scanStream=null,scanIv=null;
function stopScanner(){clearInterval(scanIv);scanIv=null;if(scanStream){scanStream.getTracks().forEach(t=>t.stop());scanStream=null;}}
async function startScanner(onDetect){
  stopScanner();
  const v=el('sv');if(!v)return;
  try{
    scanStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    v.srcObject=scanStream;
    if('BarcodeDetector' in window){
      const det=new BarcodeDetector({formats:['ean_13','ean_8','code_128','upc_a','upc_e']});
      scanIv=setInterval(async()=>{
        if(v.readyState===4){const c=await det.detect(v).catch(()=>[]);if(c.length){stopScanner();onDetect(c[0].rawValue);}}
      },400);
    }
  }catch(e){}
}

function D(){

}
const cs=o=>Object.entries(o).map(([k,v])=>`${k.replace(/([A-Z])/g,m=>'-'+m.toLowerCase())}:${v}`).join(';');
function crd(){const d=D();return `background:${d.card};border:1px solid ${d.brd};border-radius:14px;padding:14px;margin-bottom:10px;`;}

function tg(c){return `padding:2px 8px;border-radius:20px;background:${c}22;color:${c};font-size:11px;font-weight:700;display:inline-block;`;}
function nbtn(a,id,ico,lbl){const d=D();return `<button onclick="ST('${id}')" style="flex:1;padding:11px 4px;background:none;border:none;color:${a?'#00e5a0':d.sub};font-size:10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-weight:${a?700:400};border-top:${a?'2px solid #00e5a0':'2px solid transparent'};font-family:'DM Sans',sans-serif;"><span style="font-size:22px;">${ico}</span>${lbl}</button>`;}

function todayActive(){return S.sales.filter(s=>s.date===todayStr()&&!s.cancelled);}

// ── Reportes ──────────────────────────────────────────────
function rRep(){
  const d=D();
  const filt=filterPeriod(S.sales,S.period);
  const act=filt.filter(s=>!s.cancelled);
  const rev=act.reduce((s,v)=>s+v.total,0),prf=act.reduce((s,v)=>s+v.profit,0);
  const byM={cash:0,card:0,transfer:0};act.forEach(s=>{byM[s.payMethod]=(byM[s.payMethod]||0)+s.total;});
  const byCaja={};act.forEach(s=>{const n=s.cashierName||'Caja 1';if(!byCaja[n])byCaja[n]={rev:0,profit:0,count:0};byCaja[n].rev+=s.total;byCaja[n].profit+=s.profit;byCaja[n].count++;});
  const last7=[...Array(7)].map((_,i)=>{const dt=new Date();dt.setDate(dt.getDate()-i);const ds=dt.toISOString().split('T')[0];
    const day=S.sales.filter(s=>s.date===ds&&!s.cancelled);
    return{label:i===0?'Hoy':dt.toLocaleDateString('es-MX',{weekday:'short'}),rev:day.reduce((s,v)=>s+v.total,0),profit:day.reduce((s,v)=>s+v.profit,0)};
  }).reverse();
  const maxR=Math.max(...last7.map(d=>d.rev),1);
  const top5=S.prods.map(p=>({...p,sold:act.flatMap(s=>s.items).filter(i=>i.barcode===p.barcode).reduce((s,i)=>s+i.qty,0)})).sort((a,b)=>b.sold-a.sold).slice(0,5);
  const now=new Date();
  const PL={day:'Hoy',week:'Esta semana',month:'Este mes',year:'Este año'};
  const PS={day:now.toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long',year:'numeric'}),
    week:`Semana del ${new Date(new Date().setDate(now.getDate()-now.getDay())).toLocaleDateString('es-MX',{day:'numeric',month:'short'})}`,
    month:new Date().toLocaleDateString('es-MX',{month:'long',year:'numeric'}),year:new Date().getFullYear().toString()}[S.period];
  return `
  <div style="${crd()}padding:10px 12px;">
    <div style="color:${d.sub};font-size:11px;margin-bottom:8px;font-weight:600;">PERIODO DEL REPORTE</div>
    <div style="display:flex;gap:6px;">
      ${[['day','Hoy'],['week','Semana'],['month','Mes'],['year','Año']].map(([id,lbl])=>`
      <button onclick="S.period='${id}';render()" style="flex:1;padding:8px 4px;border-radius:8px;border:2px solid ${S.period===id?'#00e5a0':d.brd};background:${S.period===id?(S.dark?'rgba(0,229,160,0.1)':'rgba(0,180,130,0.07)'):'transparent'};color:${S.period===id?'#00e5a0':d.sub};cursor:pointer;font-size:12px;font-weight:${S.period===id?700:400};font-family:'DM Sans',sans-serif;">${lbl}</button>`).join('')}
    </div>
  </div>
  <button onclick="printReport(filterPeriod(S.sales,S.period),'${PL[S.period]}','${PS}')"
    style="${btn(S.dark?'#1e3a2f':'#e8f5f0','#00e5a0')};width:100%;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:8px;border:1px solid rgba(0,229,160,0.3);">
    📥 Descargar PDF — ${PL[S.period]}
  </button>
  <div style="${crd()}background:${S.dark?'linear-gradient(135deg,rgba(0,229,160,0.07),rgba(0,180,216,0.07))':'linear-gradient(135deg,rgba(0,229,160,0.04),rgba(0,180,216,0.04))'};border:1px solid rgba(0,229,160,0.15);">
    <div style="color:${d.sub};font-size:12px;margin-bottom:8px;">📊 ${PL[S.period]} — ${PS}</div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;">
      ${[['Ventas',act.length,d.fg],['Ingresos',fmt(rev),'#00b4d8'],['Ganancia',fmt(prf),'#00e5a0'],['Canceladas',filt.filter(s=>s.cancelled).length,'#ff6b6b']].map(([l,v,c])=>`
      <div style="text-align:center;"><div style="color:${c};font-size:18px;font-weight:900;line-height:1;">${v}</div><div style="color:${d.sub};font-size:9px;margin-top:3px;">${l}</div></div>`).join('')}
    </div>
  </div>
  <div style="${crd()}">
    <div style="color:${d.sub};font-size:12px;font-weight:600;margin-bottom:10px;">💳 Por forma de pago</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;">
      ${PAYMENTS.map(m=>`<div style="text-align:center;padding:10px 6px;border-radius:10px;background:${S.dark?'rgba(255,255,255,0.02)':'rgba(0,0,0,0.02)'};border:1px solid ${d.brd};">
        <div style="font-size:20px;">${m.icon}</div>
        <div style="color:#00e5a0;font-weight:800;font-size:14px;margin-top:3px;">${fmt(byM[m.id]||0)}</div>
        <div style="color:${d.sub};font-size:10px;">${m.label}</div>
      </div>`).join('')}
    </div>
  </div>
  ${Object.keys(byCaja).length>1?`<div style="${crd()}">
    <div style="color:${d.sub};font-size:12px;font-weight:600;margin-bottom:10px;">🏪 Desglose por caja (tiempo real)</div>
    ${Object.entries(byCaja).map(([name,data])=>`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid ${d.brd};">
      <div><div style="font-size:13px;font-weight:600;color:${d.fg};">${name}</div><div style="font-size:11px;color:${d.sub};">${data.count} ventas</div></div>
      <div style="text-align:right;"><div style="color:#00e5a0;font-weight:700;">${fmt(data.profit)}</div><div style="font-size:11px;color:${d.sub};">ganancia</div></div>
    </div>`).join('')}
  </div>`:''}
  <div style="${crd()}">
    <div style="color:${d.sub};font-size:12px;font-weight:600;margin-bottom:10px;">📈 Últimos 7 días</div>
    <div style="display:flex;align-items:flex-end;gap:5px;height:110px;">
      ${last7.map(day=>`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;">
        ${day.rev>0?`<div style="font-size:8px;color:#00e5a0;font-weight:700;">${fmt(day.profit)}</div>`:''}
        <div style="width:100%;display:flex;flex-direction:column;gap:2px;align-items:center;">
          <div style="width:80%;background:rgba(0,229,160,0.7);border-radius:3px 3px 0 0;height:${Math.max(day.profit>0?3:0,(day.profit/maxR)*75)}px;"></div>
          <div style="width:80%;background:rgba(0,180,216,0.25);border-radius:0 0 3px 3px;height:${Math.max(day.rev>0?3:0,(day.rev/maxR)*75)}px;"></div>
        </div>
        <div style="font-size:9px;color:${d.sub};text-align:center;">${day.label}</div>
      </div>`).join('')}
    </div>
  </div>
  <div style="${crd()}">
    <div style="color:${d.sub};font-size:12px;font-weight:600;margin-bottom:10px;">🏆 Top 5 más vendidos</div>
    ${top5.filter(p=>p.sold>0).length===0?`<div style="color:${d.sub};font-size:13px;">Sin ventas en este periodo</div>`:
    top5.filter(p=>p.sold>0).map((p,i)=>`<div style="display:flex;align-items:center;gap:10px;margin-bottom:9px;padding-bottom:9px;border-bottom:${i<4?`1px solid ${d.brd}`:'none'};">
      <div style="width:26px;height:26px;background:${i===0?'#ffd700':i===1?'#c0c0c0':i===2?'#cd7f32':S.dark?'#1e1e30':'#eee'};border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;color:${i<3?'#000':d.sub};flex-shrink:0;">${i+1}</div>
      <div style="flex:1;min-width:0;"><div style="font-size:13px;font-weight:600;color:${d.fg};">${p.name}</div><div style="font-size:11px;color:${d.sub};">${p.sold} piezas</div></div>
    </div>`).join('')}
  </div>
  ${lowStock().length>0?`<div style="${crd()}background:rgba(255,165,0,0.05);border:1px solid rgba(255,165,0,0.2);">
    <div style="color:#ffa500;font-weight:700;margin-bottom:8px;font-size:13px;">⚠️ Stock bajo — revisar y surtir</div>
    ${lowStock().map(p=>`<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;color:${d.sub};"><span>${p.name}</span><span style="color:${p.stock===0?'#ff6b6b':'#ffa500'};">${p.stock===0?'AGOTADO':`${p.stock} pzas`}</span></div>`).join('')}
  </div>`:''}`;
}

// ── Modales ───────────────────────────────────────────────
function rModals(){
  const d=D();let h='';
  if(S.scanner||S.scanForAdd){
    h+=`<div style="position:fixed;inset:0;background:rgba(0,0,0,0.96);z-index:2000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:20px;">
    <div style="color:#00e5a0;font-size:13px;text-align:center;">📷 Apunta al código de barras — o escríbelo abajo</div>
    <div style="position:relative;width:280px;height:200px;border-radius:14px;overflow:hidden;border:2px solid #00e5a0;">
      <video id="sv" autoplay playsinline muted style="width:100%;height:100%;object-fit:cover;"></video>
      <div style="position:absolute;top:50%;left:0;right:0;height:2px;background:rgba(0,229,160,0.9);animation:scan 2s ease-in-out infinite;"></div>
    </div>
    <div style="display:flex;gap:8px;width:100%;max-width:320px;">
      <input id="sm" placeholder="O escribe el código aquí" autofocus onkeydown="if(event.key==='Enter'&&this.value)SD(this.value);"
        style="${inp()}flex:1;"/>
      <button onclick="SD(el('sm').value)" style="${btn()};padding:11px 18px;">OK</button>
    </div>
    <button onclick="CS()" style="padding:8px 24px;background:transparent;color:#666;border:1px solid #333;border-radius:8px;cursor:pointer;font-size:13px;">Cancelar</button>
    </div>`;
    setTimeout(()=>startScanner(SD),100);
  }
  if(S.receipt){const r=S.receipt;const pm=PAYMENTS.find(m=>m.id===r.payMethod);
    h+=`<div style="position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px;">
    <div style="background:${S.dark?'#111':d.bg};border:1px solid rgba(0,229,160,0.25);border-radius:20px;padding:24px;width:100%;max-width:340px;max-height:90vh;overflow-y:auto;">
      <div style="text-align:center;margin-bottom:14px;"><div style="font-size:42px;margin-bottom:6px;">✅</div>
      <div style="color:#00e5a0;font-weight:900;font-size:18px;">¡Venta completada!</div>
      <div style="color:${d.sub};font-size:11px;margin-top:2px;">${STORE_NAME} · ${S.cashier}</div></div>
      <div style="border-top:1px dashed ${d.brd};border-bottom:1px dashed ${d.brd};padding:10px 0;margin:10px 0;">
        ${r.items.map(it=>`<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px;"><span style="color:${d.sub};">${it.name} ×${it.qty}</span><span style="color:${d.fg};">${fmt(it.price*it.qty)}</span></div>`).join('')}
      </div>
      <div style="display:flex;flex-direction:column;gap:5px;">
        <div style="display:flex;justify-content:space-between;font-weight:800;font-size:18px;color:${d.fg};"><span>Total</span><span style="color:#00e5a0;">${fmt(r.total)}</span></div>
        <div style="display:flex;justify-content:space-between;font-size:13px;"><span style="color:${d.sub};">Pago</span><span style="color:${d.fg};">${pm?.icon} ${pm?.label}</span></div>
        ${r.payMethod==='cash'?`<div style="display:flex;justify-content:space-between;font-size:13px;"><span style="color:${d.sub};">Pagó</span><span style="color:${d.fg};">${fmt(r.paid)}</span></div>
        ${r.change>0?`<div style="display:flex;justify-content:space-between;font-size:13px;"><span style="color:${d.sub};">Cambio</span><span style="color:#ffa500;font-weight:700;">${fmt(r.change)}</span></div>`:''}`:''} 
        <div style="background:rgba(0,229,160,0.06);border-radius:8px;padding:8px 11px;margin-top:3px;">
          <div style="display:flex;justify-content:space-between;font-size:13px;"><span style="color:${d.sub};">Tu ganancia</span><span style="color:#00e5a0;font-weight:800;">+${fmt(r.profit)}</span></div>
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-top:16px;">
        <button onclick="S.whatsModal=S.receipt;render()" style="${btn('#25D366','#fff')};flex:1;display:flex;align-items:center;justify-content:center;gap:6px;font-size:13px;"><span style="font-size:16px;">📲</span> WhatsApp</button>
        <button onclick="S.receipt=null;render()" style="${btn()};flex:2;font-size:15px;">+ Nueva venta</button>
      </div>
    </div></div>`;
  }
  if(S.whatsModal){
    h+=`<div style="position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:400;display:flex;align-items:center;justify-content:center;padding:16px;">
    <div style="background:${S.dark?'#111':d.bg};border:1px solid rgba(37,211,102,0.3);border-radius:20px;padding:24px;width:100%;max-width:340px;">
      <div style="font-size:36px;text-align:center;margin-bottom:8px;">📲</div>
      <div style="font-weight:800;font-size:16px;color:${d.fg};text-align:center;margin-bottom:4px;">Enviar ticket por WhatsApp</div>
      <div style="color:${d.sub};font-size:12px;text-align:center;margin-bottom:16px;">El número <b style="color:#ff6b6b;">no queda guardado</b>.</div>
      <div style="color:${d.sub};font-size:12px;margin-bottom:6px;">Número del cliente (10 dígitos)</div>
      <input id="wn" type="tel" maxlength="10" value="${S.whatsNum}"
        oninput="S.whatsNum=this.value.replace(/\\D/g,'').slice(0,10);this.value=S.whatsNum;"
        placeholder="5512345678" style="${inp()}font-family:'DM Mono',monospace;font-size:18px;letter-spacing:2px;text-align:center;margin-bottom:6px;"/>
      <div style="color:${d.sub};font-size:11px;text-align:center;margin-bottom:14px;">Se agrega +52 automáticamente</div>
      <div style="display:flex;gap:8px;">
        <button onclick="S.whatsModal=null;S.whatsNum='';S.receipt=null;render()" style="${btn(S.dark?'#1e1e3a':'#f0f0f8',d.sub)};flex:1;">Omitir</button>
        <button onclick="if(S.whatsNum.length===10)sendWA(S.whatsModal,S.whatsNum);else notify('Ingresa 10 dígitos','err');"
          style="${btn('#25D366','#fff')};flex:2;display:flex;align-items:center;justify-content:center;gap:6px;">📲 Enviar</button>
      </div>
    </div></div>`;
  }
  if(S.cancelModal){const s=S.cancelModal;
    h+=`<div style="position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:1500;display:flex;align-items:center;justify-content:center;padding:16px;">
    <div style="background:${S.dark?'#111':d.bg};border:1px solid rgba(255,107,107,0.4);border-radius:20px;padding:24px;width:100%;max-width:360px;">
      <div style="text-align:center;margin-bottom:20px;"><div style="font-size:44px;margin-bottom:8px;">⛔</div>
      <div style="color:#ff6b6b;font-weight:900;font-size:18px;">Cancelar venta</div>
      <div style="color:${d.sub};font-size:12px;margin-top:4px;">Esta acción requiere tu contraseña</div></div>
      <div style="background:${S.dark?'rgba(255,255,255,0.03)':'#f8f8f8'};border:1px solid ${d.brd};border-radius:10px;padding:12px;margin-bottom:16px;">
        <div style="font-size:12px;color:${d.sub};margin-bottom:6px;">Venta a cancelar:</div>
        ${s.items.map(it=>`<div style="display:flex;justify-content:space-between;font-size:12px;color:${d.fg};margin-bottom:2px;"><span>${it.name} ×${it.qty}</span><span>${fmt(it.price*it.qty)}</span></div>`).join('')}
        <div style="border-top:1px solid ${d.brd};margin-top:8px;padding-top:8px;display:flex;justify-content:space-between;font-weight:700;color:${d.fg};"><span>Total</span><span style="color:#ff6b6b;">${fmt(s.total)}</span></div>
      </div>
      <div style="margin-bottom:12px;">
        <div style="color:${d.sub};font-size:12px;margin-bottom:6px;">Motivo *</div>
        <select id="cr" style="${inp()}">
          <option value="">Selecciona un motivo...</option>
          <option>Cliente desistió de la compra</option>
          <option>Pago con tarjeta rechazado</option>
          <option>Producto no disponible</option>
          <option>Error en el cobro</option>
          <option>Otro</option>
        </select>
      </div>
      <div style="margin-bottom:16px;">
        <div style="color:${d.sub};font-size:12px;margin-bottom:6px;">🔑 Contraseña del negocio *</div>
        <input id="cp" type="password" placeholder="Ingresa tu contraseña para autorizar" onkeydown="if(event.key==='Enter')CC()"
          style="${inp()}border:2px solid ${d.inpB};"/>
        <div id="ce" style="display:none;color:#ff6b6b;font-size:12px;margin-top:6px;"></div>
      </div>
      <div style="background:rgba(255,107,107,0.06);border:1px solid rgba(255,107,107,0.15);border-radius:8px;padding:8px 12px;margin-bottom:14px;font-size:12px;color:${S.dark?'#ff9999':'#cc4444'};">
        ⚠️ El inventario se restaurará automáticamente.
      </div>
      <div style="display:flex;gap:8px;">
        <button onclick="S.cancelModal=null;render()" style="${btn(S.dark?'#1e1e3a':'#f0f0f8',d.sub)};flex:1;">Volver</button>
        <button onclick="CC()" style="${btn('#ff6b6b','#fff')};flex:2;">⛔ Confirmar cancelación</button>
      </div>
    </div></div>`;
  }
  if(S.notif) h+=`<div style="position:fixed;top:66px;left:50%;transform:translateX(-50%);background:${S.notif.type==='err'?'#ff6b6b':'#00e5a0'};color:#000;padding:9px 20px;border-radius:10px;font-weight:700;font-size:13px;z-index:600;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,0.4);">${S.notif.msg}</div>`;
  return h;
}

// ── Render principal ──────────────────────────────────────
function render(){
  const d=D();const root=el('root');
  if(S.loading){
    root.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px;background:${d.bg};">
      <div style="width:40px;height:40px;border:3px solid rgba(0,229,160,0.2);border-top-color:#00e5a0;border-radius:50%;animation:spin 1s linear infinite;"></div>
      <div style="color:#444;font-size:13px;">Sincronizando datos...</div></div>`;
    return;
  }
  if(!S.user){root.innerHTML=rLogin()+rModals();return;}
  root.innerHTML=`<div style="min-height:100vh;background:${d.bg};color:${d.fg};display:flex;flex-direction:column;max-width:480px;margin:0 auto;transition:background .3s;">
    ${rHdr()}
    <div style="flex:1;overflow-y:auto;padding:14px 14px 80px;">
      ${S.tab==='sell'?rSell():S.tab==='inv'?rInv():rRep()}
    </div>
    <div style="display:flex;background:${d.nav};border-top:1px solid ${d.brd};position:sticky;bottom:0;z-index:90;backdrop-filter:blur(20px);">
      ${nbtn(S.tab==='sell','sell','🏪','Vender')}${nbtn(S.tab==='inv','inv','📦','Inventario')}${nbtn(S.tab==='rep','rep','📊','Reportes')}
    </div>
  </div>${rModals()}`;
}

// ── Handlers globales ─────────────────────────────────────
window.LC=()=>doLogin(el('le')?.value||'',el('lp')?.value||'',el('lc')?.value||'Caja 1');
window.ST=t=>{S.tab=t;S.searchQ='';render();};
window.CQ=(b,d)=>{const p=S.prods.find(p=>p.barcode===b);S.cart=S.cart.map(c=>{if(c.barcode!==b)return c;const nq=c.qty+d;if(nq<1)return c;if(nq>p?.stock){notify('Sin suficiente existencia','err');return c;}return{...c,qty:nq};});render();};
window.RC=b=>{S.cart=S.cart.filter(c=>c.barcode!==b);render();};
window.US=async(b,v)=>{const p=S.prods.find(p=>p.barcode===b);if(!p)return;await prodsRef().child(b).set({...p,stock:parseInt(v)||0});notify('✓ Stock actualizado');};
window.OA=()=>{S.addModal=true;S.newP={barcode:'',name:'',cat:'',cost:'',price:'',stock:'',min:'5'};render();};
window.SNP=async()=>{const p=S.newP;if(!p.barcode||!p.name){notify('Código y nombre requeridos','err');return;}if(S.prods.find(pr=>pr.barcode===p.barcode)){notify('Ese código ya existe','err');return;}await prodsRef().child(p.barcode).set({...p,cost:+p.cost,price:+p.price,stock:+p.stock,min:+p.min||5});S.addModal=false;notify('✓ Producto agregado');};
window.SD=code=>{stopScanner();if(S.scanForAdd){S.newP.barcode=code;S.scanForAdd=false;notify('✓ Código escaneado: '+code);}else{addByBarcode(code);S.scanner=false;}render();};
window.CS=()=>{stopScanner();S.scanner=false;S.scanForAdd=false;render();};
window.CC=async()=>{const reason=el('cr')?.value,pass=el('cp')?.value,e=el('ce');if(!reason){if(e){e.style.display='block';e.textContent='Selecciona un motivo.';}return;}try{await firebase.auth().signInWithEmailAndPassword(S.user.email,pass);await cancelSale(S.cancelModal,reason);}catch(err){if(e){e.style.display='block';e.textContent='Contraseña incorrecta.';}}};
window.doLogout=doLogout;window.installApp=installApp;
window.addByBarcode=addByBarcode;window.finalizeSale=finalizeSale;
window.filterPeriod=filterPeriod;window.printReport=printReport;
window.el=el;window.S=S;

render();
</script>
</body>
</html>
