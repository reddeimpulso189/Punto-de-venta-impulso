function notify(msg,type='ok'){
  if(S.notifTimer)clearTimeout(S.notifTimer);
  S.notif={msg,type};
  S.notifTimer=setTimeout(()=>{S.notif=null;render();},2800);
  render();
}

const isCaja1=()=>S.cashier===(getCFG().caja1Name||'Caja 1') || S.cashier==='Caja 1';

// ── Carrito ────────────────────────────────────────────────────
function cartTotal(){return S.cart.reduce((t,c)=>t+c.price*c.qty,0);}
function cartProfit(){return S.cart.reduce((t,c)=>t+(c.price-c.cost)*c.qty,0);}
function cartChange(){return S.paid?Math.max(0,parseFloat(S.paid)-cartTotal()):0;}

function addByBarcode(code){
  if(!code||!code.trim())return;
  const p=S.prods.find(p=>p.barcode===code.trim());
  if(!p){notify('No encontrado: '+code,'err');return;}
  if(p.stock<=0){notify('Sin stock: '+p.name,'err');return;}
  const ex=S.cart.find(c=>c.barcode===p.barcode);
  if(ex){if(ex.qty>=p.stock){notify('Sin suficiente existencia','err');return;}
    S.cart=S.cart.map(c=>c.barcode===p.barcode?{...c,qty:c.qty+1}:c);
  }else S.cart=[...S.cart,{...p,qty:1}];
  notify('✓ '+p.name);
}

function finalizeSale(){
  if(!S.cart.length)return;
  const total=cartTotal(),profit=cartProfit();
  const sale={
    id:'s'+Date.now(),date:todayStr(),timestamp:Date.now(),
    items:[...S.cart],total,profit,
    paid:parseFloat(S.paid)||total,change:cartChange(),
    payMethod:S.payMethod,cashierName:S.cashier,
    cancelled:false,cancelledBy:null,cancelReason:null,
  };
  const ns=[...S.sales,sale];setSales(ns);S.sales=ns;
  const np=S.prods.map(p=>{const it=S.cart.find(c=>c.barcode===p.barcode);return it?{...p,stock:p.stock-it.qty}:p;});
  setProds(np);S.prods=np;
  S.cart=[];S.paid='';S.payMethod='cash';S.receipt=sale;render();
}

function cancelSale(sale,reason){
  const np=S.prods.map(p=>{const it=sale.items.find(i=>i.barcode===p.barcode);return it?{...p,stock:p.stock+it.qty}:p;});
  setProds(np);S.prods=np;
  const ns=S.sales.map(s=>s.id===sale.id?{...s,cancelled:true,cancelledBy:S.cashier,cancelReason:reason}:s);
  setSales(ns);S.sales=ns;
  S.cancelModal=null;notify('⛔ Venta cancelada — stock restaurado');
}

function addProdOrUpdate(barcode){
  // Si el producto ya existe, abre modal de actualizar existencia
  const p=S.prods.find(p=>p.barcode===barcode);
  if(p){S.updateStockModal=p;render();return;}
  // Si no existe, abre modal de agregar con barcode prellenado
  S.newP={barcode,name:'',cat:'',cost:'',price:'',stock:'',min:'5'};
  S.addModal=true;render();
}

function updateStock(barcode,qty){
  S.prods=S.prods.map(p=>p.barcode===barcode?{...p,stock:parseInt(qty)||0}:p);
  setProds(S.prods);
  S.updateStockModal=null;
  notify('✓ Existencia actualizada');render();
}

function filterPeriod(sales,period){
  const now=new Date();
  return sales.filter(v=>{
    const d=new Date(v.timestamp);
    if(period==='day')return v.date===todayStr();
    if(period==='week'){const s=new Date(now);s.setDate(now.getDate()-now.getDay());s.setHours(0,0,0,0);return d>=s;}
    if(period==='month')return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    if(period==='year')return d.getFullYear()===now.getFullYear();
    return true;
  });
}

// ── Ticket de impresión física (80mm) ─────────────────────────
function printTicket(sale){
  const pm={cash:'Efectivo',card:'Tarjeta',transfer:'Transferencia'}[sale.payMethod]||'—';
  const lines=sale.items.map(i=>`${i.name.substring(0,20).padEnd(20,' ')} ${String(i.qty).padStart(2,' ')}x${fmt(i.price).padStart(7,' ')} ${fmt(i.price*i.qty).padStart(8,' ')}`).join('\n');
  const sep='─'.repeat(42);
  const ticket=`
${CFG.storeName.toUpperCase()}
${CFG.address}
Tel: ${CFG.phone}
${sep}
TICKET DE COMPRA
${new Date(sale.timestamp).toLocaleString('es-MX',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'})}
Caja: ${sale.cashierName}
${sep}
PRODUCTO             CANT  PRECIO    TOTAL
${lines}
${sep}
SUBTOTAL:                        ${fmt(sale.total).padStart(8,' ')}
FORMA DE PAGO: ${pm}
${sale.payMethod==='cash'?`PAGÓ:                            ${fmt(sale.paid).padStart(8,' ')}\nCAMBIO:                          ${fmt(sale.change).padStart(8,' ')}`:''}
${sep}
GANANCIA DE ESTA VENTA: ${fmt(sale.profit)}
${sep}
¡Gracias por su compra!
Quejas: ${CFG.complaints}
${sep}
`;
  const el=G('ticket-print');
  el.style.display='block';
  el.innerHTML='<pre style="font-size:11px;font-family:Courier New,monospace;white-space:pre;color:#000;">'+ticket+'</pre>';
  window.print();
  setTimeout(()=>{el.style.display='none';},1000);
}

function printReport(sales,label,period,cajaName){
  const active=sales.filter(s=>!s.cancelled);
  const total=active.reduce((s,v)=>s+v.total,0),profit=active.reduce((s,v)=>s+v.profit,0);
  const byM={cash:0,card:0,transfer:0};active.forEach(s=>{byM[s.payMethod]=(byM[s.payMethod]||0)+s.total;});
  const byCaja={};active.forEach(s=>{const n=s.cashierName||'Caja 1';if(!byCaja[n])byCaja[n]={rev:0,profit:0,count:0};byCaja[n].rev+=s.total;byCaja[n].profit+=s.profit;byCaja[n].count++;});
  const rows=sales.map(s=>`<tr style="${s.cancelled?'background:#fff5f5;text-decoration:line-through;color:#bbb':''}">
    <td>${new Date(s.timestamp).toLocaleString('es-MX',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</td>
    <td>${s.cashierName||'Caja 1'}</td>
    <td style="font-size:10px">${s.items.map(i=>`${i.name}×${i.qty}`).join(', ')}</td>
    <td>${{cash:'Efectivo',card:'Tarjeta',transfer:'Transferencia'}[s.payMethod]||'—'}</td>
    <td style="text-align:right">$${s.total.toFixed(2)}</td>
    <td style="text-align:right;color:${s.cancelled?'#ccc':'#007744'}">$${s.profit.toFixed(2)}</td>
    <td>${s.cancelled?'<b style="color:#c00">CANCELADA</b>':'✓'}</td>
  </tr>`).join('');
  const cajaRows=Object.entries(byCaja).map(([name,d])=>`<tr><td><b>${name}</b></td><td>${d.count}</td><td>$${d.rev.toFixed(2)}</td><td style="color:#007744">$${d.profit.toFixed(2)}</td></tr>`).join('');
  const w=window.open('','_blank','width=980,height=720');if(!w)return;
  w.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"/><title>${CFG.storeName} — ${label}</title>
  <style>body{font-family:Arial,sans-serif;font-size:12px;padding:24px;max-width:960px;margin:0 auto;}
  h1{font-size:20px;}h2{color:#666;font-size:13px;margin:0 0 16px;}
  .g{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
  .b{border:1px solid #e0e0e0;border-radius:8px;padding:10px 16px;flex:1;text-align:center;min-width:100px;}
  .b span{font-size:10px;color:#888;display:block;}.b b{font-size:20px;display:block;margin-top:3px;}
  .gr b{color:#007744;}.bl b{color:#0055cc;}.rd b{color:#cc0000;}
  table{width:100%;border-collapse:collapse;margin-bottom:20px;}
  th{background:#f5f5f5;padding:7px 8px;text-align:left;border-bottom:2px solid #ddd;font-size:11px;}
  td{padding:5px 8px;border-bottom:1px solid #eee;font-size:11px;}
  h3{font-size:14px;margin:16px 0 8px;}
  @media print{body{padding:0;}}</style></head><body>
  <h1>📊 ${label}${cajaName?` · ${cajaName}`:' · General'}</h1>
  <h2>${CFG.storeName} · ${CFG.ownerName} · ${period}</h2>
  <div class="g"><div class="b"><span>Ventas</span><b>${active.length}</b></div>
  <div class="b bl"><span>Ingresos</span><b>$${total.toFixed(2)}</b></div>
  <div class="b gr"><span>Ganancia</span><b>$${profit.toFixed(2)}</b></div>
  <div class="b rd"><span>Canceladas</span><b>${sales.filter(s=>s.cancelled).length}</b></div></div>
  <div class="g"><div class="b"><span>💵 Efectivo</span><b>$${(byM.cash||0).toFixed(2)}</b></div>
  <div class="b"><span>💳 Tarjeta</span><b>$${(byM.card||0).toFixed(2)}</b></div>
  <div class="b"><span>📲 Transferencia</span><b>$${(byM.transfer||0).toFixed(2)}</b></div></div>
  ${Object.keys(byCaja).length>1?`<h3>Por caja</h3><table><thead><tr><th>Caja</th><th>Ventas</th><th>Ingresos</th><th>Ganancia</th></tr></thead><tbody>${cajaRows}</tbody></table>`:''}
  <h3>Detalle</h3>
  <table><thead><tr><th>Hora</th><th>Caja</th><th>Productos</th><th>Pago</th><th>Total</th><th>Ganancia</th><th>Estado</th></tr></thead>
  <tbody>${rows}</tbody></table>
  <div style="font-size:10px;color:#aaa;text-align:center;margin-top:16px;">Punto de Venta Impulso · ${new Date().toLocaleString('es-MX')}</div>
  </body></html>`);
  w.document.close();setTimeout(()=>w.print(),500);
}

// ── Escáner ────────────────────────────────────────────────────
let scanStream=null,scanIv=null;
function stopScanner(){clearInterval(scanIv);scanIv=null;if(scanStream){scanStream.getTracks().forEach(t=>t.stop());scanStream=null;}}
async function startScanner(cb){
  stopScanner();const v=G('sv');if(!v)return;
  try{
    scanStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    v.srcObject=scanStream;
    if('BarcodeDetector' in window){
      const det=new BarcodeDetector({formats:['ean_13','ean_8','code_128','upc_a','upc_e']});
      scanIv=setInterval(async()=>{if(v.readyState===4){const c=await det.detect(v).catch(()=>[]);if(c.length){stopScanner();cb(c[0].rawValue);}}},400);
    }
  }catch(e){}
}

function D(){return S.dark
  ?{bg:'#080812',bg2:'#0e0e1c',card:'rgba(255,255,255,0.04)',brd:'rgba(255,255,255,0.08)',fg:'#fff',sub:'#666',inp:'rgba(255,255,255,0.06)',inpB:'rgba(255,255,255,0.1)',hdr:'rgba(8,8,18,0.85)',nav:'rgba(8,8,18,0.9)',hvr:'rgba(0,229,160,0.08)',sb:'#0b0b1a'}
  :{bg:'#f4f6fb',bg2:'#eef0f8',card:'#fff',brd:'#e4e8f0',fg:'#111',sub:'#888',inp:'#f8f9fc',inpB:'#dde1ea',hdr:'rgba(244,246,251,0.95)',nav:'rgba(244,246,251,0.95)',hvr:'rgba(0,180,130,0.06)',sb:'#fff'};}
const crd=()=>{const d=D();return`background:${d.card};border:1px solid ${d.brd};border-radius:14px;padding:16px;margin-bottom:12px;`;};
const IS=()=>{const d=D();return`padding:11px 14px;border-radius:10px;border:1px solid ${d.inpB};background:${d.inp};color:${d.fg};font-size:15px;width:100%;box-sizing:border-box;outline:none;font-family:'DM Sans',sans-serif;`;};
const BS=(bg='#00e5a0',fg='#000')=>`padding:12px 20px;background:${bg};color:${fg};border:none;border-radius:10px;font-weight:700;cursor:pointer;font-size:14px;font-family:'DM Sans',sans-serif;`;
const TG=c=>`padding:3px 10px;border-radius:20px;background:${c}22;color:${c};font-size:11px;font-weight:700;display:inline-block;`;
const lowStock=()=>S.prods.filter(p=>p.stock<=p.min);
const todayPrf=()=>S.sales.filter(s=>s.date===todayStr()&&!s.cancelled).reduce((s,v)=>s+v.profit,0);

// ── Input contraseña con ojo ──────────────────────────────────
function passInput(id,showKey,placeholder,onEnter='',extraStyle=''){
  const d=D();const show=S.showPass[showKey];
  return`<div style="position:relative;">
    <input id="${id}" type="${show?'text':'password'}" placeholder="${placeholder}"
      style="${IS()}padding-right:48px;${extraStyle}"
      ${onEnter?`onkeydown="if(event.key==='Enter'){${onEnter}}"`:''}/>
    <button type="button" onclick="S.showPass.${showKey}=!S.showPass.${showKey};render()"
      style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:18px;color:${d.sub};padding:4px;">
      ${show?'🙈':'👁️'}
    </button>
  </div>`;
}

function doLogin1(){
  const email=G('l-email')?.value||'',pass=G('l-pass')?.value||'',e=G('l-err');
  if(email!==CFG.email||pass!==CFG.password){if(e){e.style.display='block';e.textContent='Correo o contraseña incorrectos.';}return;}
  S.cashier=getCFG().caja1Name||'Caja 1';S.prods=getProds();S.sales=getSales();S.cart=[];
  S.screen=CFG.blocked?'blocked':'pos';render();
}

function doLoginPin(){
  const pin=G('pin-input')?.value||'',caja=G('pin-caja')?.value||'Caja 2',e=G('pin-err');
  const ok=(caja==='Caja 2'&&pin===CFG.pin2)||(caja==='Caja 3'&&pin===CFG.pin3);
  if(!ok){if(e){e.style.display='block';e.textContent='PIN incorrecto.';}return;}
  const cfg2=getCFG();
  S.cashier=(caja==='Caja 2'?cfg2.caja2Name:cfg2.caja3Name)||caja;S.prods=getProds();S.sales=getSales();S.cart=[];
  S.screen=CFG.blocked?'blocked':'pos';S.loginStep='main';render();
}

function doLogout(){S.screen='login';S.cashier=null;S.tab='sell';S.cart=[];S.searchQ='';S.invSearchQ='';render();}

// ── Actualizar cambio sin re-render completo ─────────────────
function renderChange(){
  const paid=parseFloat(G('paid-inp')?.value||0);
  const total=cartTotal();
  const box=G('change-box'),val=G('change-val');
  if(!box||!val)return;
  if(paid>=total&&paid>0){
    box.style.display='flex';
    val.textContent=fmt(Math.max(0,paid-total));
  } else box.style.display='none';
}

// ── Buscar productos sin re-render ───────────────────────────
function renderSearch(){
  const d=D();const q=S.searchQ;
  const el=G('search-res');if(!el)return;
  if(!q){el.innerHTML='';return;}
  const r=S.prods.filter(p=>p.name.toLowerCase().includes(q.toLowerCase())).slice(0,8);
  el.innerHTML=r.map(p=>`
  <div onclick="addByBarcode('${p.barcode}');S.searchQ='';G('search-inp').value='';G('search-res').innerHTML='';"
    style="padding:10px 12px;border-radius:9px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;"
    onmouseover="this.style.background='${d.hvr}'" onmouseout="this.style.background='transparent'">
    <div>
      <div style="font-size:14px;font-weight:600;color:${d.fg};">${p.name}</div>
      <div style="font-size:11px;color:${d.sub};">Stock: ${p.stock} · ${p.cat}</div>
    </div>
    <div style="color:#00e5a0;font-weight:700;font-size:15px;">${fmt(p.price)}</div>
  </div>`).join('');
}

  <!-- Modal escáner inventario -->

    <div style="color:#00e5a0;font-size:14px;text-align:center;font-weight:600;">📷 Escanea el código de barras para buscar o agregar</div>
    <div style="position:relative;width:300px;height:220px;border-radius:16px;overflow:hidden;border:2px solid #00e5a0;">
      <video id="sv" autoplay playsinline muted style="width:100%;height:100%;object-fit:cover;"></video>
      <div style="position:absolute;top:50%;left:0;right:0;height:2px;background:rgba(0,229,160,0.9);animation:scan 2s ease-in-out infinite;"></div>
    </div>
    <div style="display:flex;gap:8px;width:100%;max-width:360px;">

  </div>`:''
  }
  ${(()=>{if(!S.invScannerOpen)return'';setTimeout(()=>startScanner(invScanDetect),100);return '';})()}

  <!-- Modal agregar producto -->
  ${S.addModal?htmlAddModal():''}

  <!-- Modal actualizar existencia -->
  ${S.updateStockModal?htmlUpdateStockModal():''}

  <!-- Modal detalle producto -->
  ${S.prodDetailModal?htmlProdDetail():''}`;
}

function invScanDetect(code){
  stopScanner();S.invScannerOpen=false;
  // Busca el producto
  const p=S.prods.find(p=>p.barcode===code.trim());
  if(p){
    // Producto existe: abrir modal actualizar existencia
    S.updateStockModal=code.trim();
    notify('✓ Producto encontrado: '+p.name);
  } else {
    // Producto nuevo: abrir modal agregar con código prellenado
    S.newP={barcode:code.trim(),name:'',cat:'',cost:'',price:'',stock:'',min:'5'};
    S.addModal=true;
    notify('Nuevo producto. Completa la información.');
  }
  render();
}

function htmlRep(){

  const allFilt=filterPeriod(S.sales,S.period);
  const cajaFilt=S.cajaFilter==='all'?allFilt:allFilt.filter(s=>s.cashierName===S.cajaFilter);
  const active=cajaFilt.filter(s=>!s.cancelled);
  const rev=active.reduce((s,v)=>s+v.total,0),prf=active.reduce((s,v)=>s+v.profit,0);
  const byM={cash:0,card:0,transfer:0};active.forEach(s=>{byM[s.payMethod]=(byM[s.payMethod]||0)+s.total;});
  const byCaja={};allFilt.filter(s=>!s.cancelled).forEach(s=>{const n=s.cashierName||'Caja 1';if(!byCaja[n])byCaja[n]={rev:0,profit:0,count:0};byCaja[n].rev+=s.total;byCaja[n].profit+=s.profit;byCaja[n].count++;});
  const last7=[...Array(7)].map((_,i)=>{const dt=new Date();dt.setDate(dt.getDate()-i);const ds=dt.toISOString().split('T')[0];const day=S.sales.filter(s=>s.date===ds&&!s.cancelled&&(S.cajaFilter==='all'||s.cashierName===S.cajaFilter));return{label:i===0?'Hoy':dt.toLocaleDateString('es-MX',{weekday:'short'}),rev:day.reduce((s,v)=>s+v.total,0),profit:day.reduce((s,v)=>s+v.profit,0)};}).reverse();

    </button>

function saveSettings(){
  const cfg=getCFG();
  const merged={...cfg,...S.cfgEdit};
  // Read password field separately (uses passInput id)
  const passEl=G('cfg-password');if(passEl&&passEl.value)merged.password=passEl.value;
  // Validate
  if(!merged.storeName||!merged.email||!merged.password){notify('Nombre, correo y contraseña son requeridos','err');return;}
  setCFG(merged);
  Object.assign(CFG,merged);
  S.cfgEdit={};
  notify('✓ Configuración guardada correctamente');
  render();
}

    </div>
  </div>`;

  const mobHeader=`<div class="mob-header" style="background:${d.hdr};border-bottom:1px solid ${d.brd};">
    <div><div style="font-weight:900;font-size:14px;">${CFG.storeName}</div><div style="font-size:10px;color:${d.sub};">${S.cashier}</div></div>
    <div style="display:flex;align-items:center;gap:8px;">
      ${ls.length>0?`<div style="background:#ff4444;color:#fff;font-size:10px;font-weight:800;padding:2px 7px;border-radius:20px;cursor:pointer;" onclick="ST('inv')">🔴${ls.length}</div>`:''}
      <div style="text-align:right;margin-right:2px;"><div style="color:#00e5a0;font-weight:800;font-size:13px;">${fmt(todayPrf())}</div><div style="font-size:9px;color:${d.sub};">ganancia hoy</div></div>
      <button onclick="S.dark=!S.dark;render()" style="background:${S.dark?'rgba(255,255,255,0.07)':'rgba(0,0,0,0.07)'};border:1px solid ${d.brd};color:${d.fg};border-radius:8px;padding:5px 9px;cursor:pointer;font-size:16px;">${S.dark?'☀️':'🌙'}</button>
      <button onclick="doLogout()" style="background:${S.dark?'rgba(255,255,255,0.04)':'rgba(0,0,0,0.04)'};border:1px solid ${d.brd};color:${d.sub};border-radius:8px;padding:5px 9px;cursor:pointer;font-size:12px;">Salir</button>
    </div>
  </div>`;

  const mobNav=`<div class="mob-nav" style="background:${d.nav};border-top:1px solid ${d.brd};">
    <button onclick="ST('sell')" style="flex:1;padding:11px 4px;background:none;border:none;color:${S.tab==='sell'?'#00e5a0':d.sub};font-size:10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-weight:${S.tab==='sell'?700:400};border-top:${S.tab==='sell'?'2px solid #00e5a0':'2px solid transparent'};font-family:'DM Sans',sans-serif;"><span style="font-size:22px;">🏪</span>Vender</button>
    ${isCaja1()?`
    <button onclick="ST('inv')" style="flex:1;padding:11px 4px;background:none;border:none;color:${S.tab==='inv'?'#00e5a0':d.sub};font-size:10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-weight:${S.tab==='inv'?700:400};border-top:${S.tab==='inv'?'2px solid #00e5a0':'2px solid transparent'};font-family:'DM Sans',sans-serif;"><span style="font-size:22px;">📦</span>Inventario</button>
    <button onclick="ST('rep')" style="flex:1;padding:11px 4px;background:none;border:none;color:${S.tab==='rep'?'#00e5a0':d.sub};font-size:10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-weight:${S.tab==='rep'?700:400};border-top:${S.tab==='rep'?'2px solid #00e5a0':'2px solid transparent'};font-family:'DM Sans',sans-serif;"><span style="font-size:22px;">📊</span>Reportes</button>
    <button onclick="ST('cfg')" style="flex:1;padding:11px 4px;background:none;border:none;color:${S.tab==='cfg'?'#00e5a0':d.sub};font-size:10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-weight:${S.tab==='cfg'?700:400};border-top:${S.tab==='cfg'?'2px solid #00e5a0':'2px solid transparent'};font-family:'DM Sans',sans-serif;"><span style="font-size:22px;">⚙️</span>Config</button>`:''}
  </div>`;

  root.innerHTML=`
  <div class="mob-wrap" style="background:${d.bg};color:${d.fg};">
    ${mobHeader}
    <div class="mob-content">${content}</div>
    ${mobNav}
  </div>
  <div class="pc-wrap" style="background:${d.bg};color:${d.fg};">
    ${sidebar}
    <div class="pc-main">
      <div class="pc-topbar" style="background:${d.hdr};border-bottom:1px solid ${d.brd};">
        <div style="font-weight:700;font-size:18px;color:${d.fg};">${{sell:'🏪 Vender',inv:'📦 Inventario',rep:'📊 Reportes',cfg:'⚙️ Configuración'}[S.tab]||'⚙️ Configuración'}</div>
        <div style="font-size:12px;color:${d.sub};">${new Date().toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long'})}</div>
      </div>
      <div class="pc-content" style="max-width:900px;">${content}</div>
    </div>
  </div>
  ${htmlModals()}`;

  // Restaurar búsqueda activa
  setTimeout(()=>{
    const si=G('search-inp');if(si&&S.searchQ){si.value=S.searchQ;renderSearch();}
    const ii=G('inv-search');if(ii)ii.value=S.invSearchQ||'';
  },0);
}

// ═══════════════════════════════════════════════════════════════
// HANDLERS
// ═══════════════════════════════════════════════════════════════
window.ST=t=>{S.tab=t;S.searchQ='';S.invSearchQ='';S.cfgEdit={};render();};
window.saveSettings=saveSettings;
window.doLogout=doLogout;window.doLogin1=doLogin1;window.doLoginPin=doLoginPin;
window.addByBarcode=addByBarcode;window.finalizeSale=finalizeSale;
window.filterPeriod=filterPeriod;window.printReport=printReport;
window.printTicket=printTicket;window.sendWA=sendWA;window.G=G;window.S=S;
window.CQ=(b,delta)=>{const p=S.prods.find(p=>p.barcode===b);S.cart=S.cart.map(c=>{if(c.barcode!==b)return c;const nq=c.qty+delta;if(nq<1)return c;if(nq>p?.stock){notify('Sin suficiente existencia','err');return c;}return{...c,qty:nq};});render();};
window.RC=b=>{S.cart=S.cart.filter(c=>c.barcode!==b);render();};
window.UNP=()=>{
  const cost=parseFloat(S.newP.cost)||0,price=parseFloat(S.newP.price)||0;
  const el=G('np-margin');if(!el)return;
  if(cost>0&&price>0){el.style.display='block';el.innerHTML=`Ganancia: <b style="color:#00e5a0;">${fmt(price-cost)} (${(((price-cost)/cost)*100).toFixed(0)}%)</b>`;}else el.style.display='none';
};
window.SNP=()=>{
  const p=S.newP;
  if(!p.barcode||!p.name){notify('Código y nombre requeridos','err');return;}
  const existing=S.prods.find(pr=>pr.barcode===p.barcode);
  if(existing){
    // Producto ya existe → actualizar existencia sumando
    const newStock=(existing.stock||0)+(parseInt(p.stock)||0);
    S.prods=S.prods.map(pr=>pr.barcode===p.barcode?{...pr,stock:newStock}:pr);
    setProds(S.prods);S.addModal=false;
    notify(`✓ Existencia actualizada: ${existing.name} → ${newStock} pzas`);render();return;
  }
  S.prods=[...S.prods,{...p,cost:+p.cost,price:+p.price,stock:+p.stock,min:+p.min||5}];
  setProds(S.prods);S.addModal=false;notify('✓ Producto agregado');render();
};
window.invScanDetect=invScanDetect;
window.updateStock=updateStock;
window.SD=code=>{stopScanner();if(S.scanForAdd){S.newP.barcode=code;S.scanForAdd=false;notify('✓ Código escaneado: '+code);}else{addByBarcode(code);S.scanner=false;}render();};
window.CC=()=>{
  const reason=G('cr')?.value,pass=G('cp')?.value,e=G('ce');
  if(!reason){if(e){e.style.display='block';e.textContent='Selecciona un motivo.';}return;}
  if(pass!==CFG.password){if(e){e.style.display='block';e.textContent='Contraseña incorrecta.';}return;}
  cancelSale(S.cancelModal,reason);render();
};
window.renderSearch=renderSearch;
window.renderChange=renderChange;

// Teclado
document.addEventListener('keydown',e=>{
  if(S.screen!=='pos')return;
  if(e.key==='Escape'){
    if(S.scanner){stopScanner();S.scanner=false;render();return;}
    if(S.scanForAdd){stopScanner();S.scanForAdd=false;render();return;}
    if(S.invScannerOpen){stopScanner();S.invScannerOpen=false;render();return;}
    if(S.receipt){S.receipt=null;render();return;}
    if(S.whatsModal){S.whatsModal=null;S.whatsNum='';render();return;}
    if(S.cancelModal){S.cancelModal=null;render();return;}
    if(S.addModal){S.addModal=false;render();return;}
    if(S.updateStockModal){S.updateStockModal=null;render();return;}
    if(S.prodDetailModal){S.prodDetailModal=null;render();return;}
  }
  if(e.key==='F2'){e.preventDefault();ST('sell');}
  if(e.key==='F3'&&isCaja1()){e.preventDefault();ST('inv');}
  if(e.key==='F4'&&isCaja1()){e.preventDefault();ST('rep');}
  if(e.key==='F5'&&isCaja1()){e.preventDefault();ST('cfg');}
});

// Init
S.prods=getProds();S.sales=getSales();render();
</script>
</body>
</html>
