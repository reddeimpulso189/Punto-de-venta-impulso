// ── Lógica ────────────────────────────────────────────────────
function cartTotal(){return S.cart.reduce((t,c)=>t+c.price*c.qty,0);}
function cartProfit(){return S.cart.reduce((t,c)=>t+(c.price-c.cost)*c.qty,0);}
function cartChange(){return S.paid?Math.max(0,parseFloat(S.paid)-cartTotal()):0;}

function addByBarcode(code){
  if(!code||!code.trim())return;
  const p=S.prods.find(p=>p.barcode===code.trim());
  if(!p){notify('No encontrado: '+code,'err');return;}
  if(p.stock<=0){notify('Sin stock: '+p.name,'err');return;}
  const ex=S.cart.find(c=>c.barcode===p.barcode);
  if(ex){if(ex.qty>=p.stock){notify('Sin suficiente existencia','err');return;}
    S.cart=S.cart.map(c=>c.barcode===p.barcode?{...c,qty:c.qty+1}:c);
  }else S.cart=[...S.cart,{...p,qty:1}];
  notify('✓ '+p.name);
}

function finalizeSale(){
  if(!S.cart.length)return;
  const total=cartTotal(),profit=cartProfit();
  const sale={
    id:'s'+Date.now(),date:todayStr(),timestamp:Date.now(),
    items:[...S.cart],total,profit,
    paid:parseFloat(S.paid)||total,change:cartChange(),
    payMethod:S.payMethod,cashierName:S.cashier,
    cancelled:false,cancelledBy:null,cancelReason:null,
  };
  const newSales=[...S.sales,sale]; setSales(newSales); S.sales=newSales;
  const newProds=S.prods.map(p=>{const it=S.cart.find(c=>c.barcode===p.barcode);return it?{...p,stock:p.stock-it.qty}:p;});
  setProds(newProds); S.prods=newProds;
  S.cart=[];S.paid='';S.payMethod='cash';S.receipt=sale;render();
}

function cancelSale(sale,reason){
  const newProds=S.prods.map(p=>{const it=sale.items.find(i=>i.barcode===p.barcode);return it?{...p,stock:p.stock+it.qty}:p;});
  setProds(newProds); S.prods=newProds;
  const newSales=S.sales.map(s=>s.id===sale.id?{...s,cancelled:true,cancelledBy:S.cashier,cancelReason:reason}:s);
  setSales(newSales); S.sales=newSales;
  S.cancelModal=null;notify('⛔ Venta cancelada — stock restaurado');
}

function filterPeriod(sales,period){
  const now=new Date();
  return sales.filter(v=>{
    const d=new Date(v.timestamp);
    if(period==='day')return v.date===todayStr();
    if(period==='week'){const s=new Date(now);s.setDate(now.getDate()-now.getDay());s.setHours(0,0,0,0);return d>=s;}
    if(period==='month')return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    if(period==='year')return d.getFullYear()===now.getFullYear();
    return true;
  });
}

let scanStream=null,scanIv=null;
function stopScanner(){clearInterval(scanIv);scanIv=null;if(scanStream){scanStream.getTracks().forEach(t=>t.stop());scanStream=null;}}
async function startScanner(cb){
  stopScanner();const v=G('sv');if(!v)return;
  try{
    scanStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    v.srcObject=scanStream;
    if('BarcodeDetector' in window){
      const det=new BarcodeDetector({formats:['ean_13','ean_8','code_128','upc_a','upc_e']});
      scanIv=setInterval(async()=>{if(v.readyState===4){const c=await det.detect(v).catch(()=>[]);if(c.length){stopScanner();cb(c[0].rawValue);}}},400);
    }
  }catch(e){}
}

function doLogin1(){
  const email=G('l-email')?.value||'';
  const pass=G('l-pass')?.value||'';
  const errEl=G('l-err');
  if(email!==CFG.email||pass!==CFG.password){
    if(errEl){errEl.style.display='block';errEl.textContent='Correo o contraseña incorrectos.';}
    return;
  }
  S.cashier='Caja 1';
  S.prods=getProds();S.sales=getSales();S.cart=[];
  S.screen=CFG.blocked?'blocked':'pos';
  render();
}

function doLoginPin(){
  const pin=G('pin-input')?.value||'';
  const caja=G('pin-caja')?.value||'Caja 2';
  const errEl=G('pin-err');
  const valid=(caja==='Caja 2'&&pin===CFG.pin2)||(caja==='Caja 3'&&pin===CFG.pin3);
  if(!valid){if(errEl){errEl.style.display='block';errEl.textContent='PIN incorrecto.';} return;}
  S.cashier=caja;
  S.prods=getProds();S.sales=getSales();S.cart=[];
  S.screen=CFG.blocked?'blocked':'pos';
  S.loginStep='main';
  render();
}

function doLogout(){
  S.screen='login';S.cashier=null;S.tab='sell';S.cart=[];S.searchQ='';
  render();
}

  const d=D();
  const allFilt=filterPeriod(S.sales,S.period);
  const cajaFilt=S.cajaFilter==='all'?allFilt:allFilt.filter(s=>s.cashierName===S.cajaFilter);
  const active=cajaFilt.filter(s=>!s.cancelled);
  const rev=active.reduce((s,v)=>s+v.total,0),prf=active.reduce((s,v)=>s+v.profit,0);
  const byM={cash:0,card:0,transfer:0};active.forEach(s=>{byM[s.payMethod]=(byM[s.payMethod]||0)+s.total;});

  // Desglose por caja
  const byCaja={};allFilt.filter(s=>!s.cancelled).forEach(s=>{
    const n=s.cashierName||'Caja 1';
    if(!byCaja[n])byCaja[n]={rev:0,profit:0,count:0};
    byCaja[n].rev+=s.total;byCaja[n].profit+=s.profit;byCaja[n].count++;
  });

  const last7=[...Array(7)].map((_,i)=>{
    const dt=new Date();dt.setDate(dt.getDate()-i);const ds=dt.toISOString().split('T')[0];
    const day=S.sales.filter(s=>s.date===ds&&!s.cancelled&&(S.cajaFilter==='all'||s.cashierName===S.cajaFilter));
    return{label:i===0?'Hoy':dt.toLocaleDateString('es-MX',{weekday:'short'}),rev:day.reduce((s,v)=>s+v.total,0),profit:day.reduce((s,v)=>s+v.profit,0)};
  }).reverse();
  const maxR=Math.max(...last7.map(x=>x.rev),1);

  const top5=S.prods.map(p=>({...p,sold:active.flatMap(s=>s.items).filter(i=>i.barcode===p.barcode).reduce((s,i)=>s+i.qty,0)})).sort((a,b)=>b.sold-a.sold).slice(0,5);

  const now=new Date();
  const PL={day:'Hoy',week:'Esta semana',month:'Este mes',year:'Este año'};
  const PS={
    day:now.toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long',year:'numeric'}),
    week:`Semana del ${new Date(new Date().setDate(now.getDate()-now.getDay())).toLocaleDateString('es-MX',{day:'numeric',month:'short'})}`,
    month:new Date().toLocaleDateString('es-MX',{month:'long',year:'numeric'}),
    year:new Date().getFullYear().toString(),
  }[S.period];
  const cajaLabel=S.cajaFilter==='all'?'General':S.cajaFilter;
  const cajas=['all','Caja 1','Caja 2','Caja 3'];

  return`
  <!-- Filtros -->
  <div style="${crd()}padding:12px 14px;">
    <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;">
      <div style="flex:1;min-width:160px;">
        <div style="color:${d.sub};font-size:11px;margin-bottom:6px;font-weight:600;">PERIODO</div>
        <div style="display:flex;gap:5px;">
          ${[['day','Hoy'],['week','Sem'],['month','Mes'],['year','Año']].map(([id,lbl])=>`
          <button onclick="S.period='${id}';render()"
            style="flex:1;padding:8px 4px;border-radius:8px;border:2px solid ${S.period===id?'#00e5a0':d.brd};background:${S.period===id?(S.dark?'rgba(0,229,160,0.1)':'rgba(0,180,130,0.07)'):'transparent'};color:${S.period===id?'#00e5a0':d.sub};cursor:pointer;font-size:12px;font-weight:${S.period===id?700:400};font-family:'DM Sans',sans-serif;">${lbl}</button>`).join('')}
        </div>
      </div>
      <div style="flex:1;min-width:160px;">
        <div style="color:${d.sub};font-size:11px;margin-bottom:6px;font-weight:600;">CAJA</div>
        <div style="display:flex;gap:5px;">
          ${cajas.map(c=>`
          <button onclick="S.cajaFilter='${c}';render()"
            style="flex:1;padding:8px 4px;border-radius:8px;border:2px solid ${S.cajaFilter===c?'#00b4d8':d.brd};background:${S.cajaFilter===c?(S.dark?'rgba(0,180,216,0.1)':'rgba(0,130,200,0.07)'):'transparent'};color:${S.cajaFilter===c?'#00b4d8':d.sub};cursor:pointer;font-size:11px;font-weight:${S.cajaFilter===c?700:400};font-family:'DM Sans',sans-serif;">${c==='all'?'Todas':c.replace('Caja ','C')}</button>`).join('')}
        </div>
      </div>
    </div>
  </div>

  <button onclick="printReport(filterPeriod(S.sales,S.period).filter(s=>S.cajaFilter==='all'||s.cashierName===S.cajaFilter),'${PL[S.period]}','${PS}','${cajaLabel==='General'?'':cajaLabel}')"
    style="${btn_s(S.dark?'#1a3a2a':'#e0f5ed','#00e5a0')};width:100%;margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:8px;border:1px solid rgba(0,229,160,0.3);font-size:14px;">
    📥 Descargar PDF — ${PL[S.period]} · ${cajaLabel}
  </button>

  <!-- Resumen principal -->
  <div style="${crd()}background:${S.dark?'linear-gradient(135deg,rgba(0,229,160,0.07),rgba(0,180,216,0.07))':'linear-gradient(135deg,rgba(0,229,160,0.04),rgba(0,180,216,0.04))'};border:1px solid rgba(0,229,160,0.18);">
    <div style="color:${d.sub};font-size:12px;margin-bottom:10px;font-weight:600;">📊 ${PL[S.period]} · ${cajaLabel} — ${PS}</div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;">
      ${[['Ventas',active.length,d.fg],['Ingresos',fmt(rev),'#00b4d8'],['Ganancia',fmt(prf),'#00e5a0'],['Canceladas',cajaFilt.filter(s=>s.cancelled).length,'#ff6b6b']].map(([l,v,c])=>`
      <div style="text-align:center;padding:8px;background:${S.dark?'rgba(0,0,0,0.2)':'rgba(255,255,255,0.6)'};border-radius:10px;">
        <div style="color:${c};font-size:20px;font-weight:900;line-height:1;">${v}</div>
        <div style="color:${d.sub};font-size:10px;margin-top:4px;">${l}</div>
      </div>`).join('')}
    </div>
  </div>

  <!-- Por forma de pago -->
  <div style="${crd()}">
    <div style="color:${d.sub};font-size:12px;font-weight:700;margin-bottom:12px;">💳 Por forma de pago</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;">
      ${PAYMENTS.map(m=>`
      <div style="text-align:center;padding:12px 8px;border-radius:12px;background:${S.dark?'rgba(255,255,255,0.03)':'rgba(0,0,0,0.02)'};border:1px solid ${d.brd};">
        <div style="font-size:22px;margin-bottom:4px;">${m.icon}</div>
        <div style="color:#00e5a0;font-weight:900;font-size:15px;">${fmt(byM[m.id]||0)}</div>
        <div style="color:${d.sub};font-size:10px;margin-top:2px;">${m.label}</div>
      </div>`).join('')}
    </div>
  </div>

  <!-- Desglose por caja -->
  <div style="${crd()}">
    <div style="color:${d.sub};font-size:12px;font-weight:700;margin-bottom:12px;">🏪 Desglose por caja — ${PL[S.period]}</div>
    ${Object.keys(byCaja).length===0?`<div style="color:${d.sub};font-size:13px;">Sin ventas en este periodo</div>`:
    Object.entries(byCaja).map(([name,data],i,arr)=>`
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:8px;padding-bottom:8px;border-bottom:${i<arr.length-1?`1px solid ${d.brd}`:'none'};">
      <div style="font-weight:700;color:${d.fg};font-size:13px;align-self:center;">${name}</div>
      <div style="text-align:center;"><div style="font-size:14px;font-weight:700;color:${d.fg};">${data.count}</div><div style="font-size:10px;color:${d.sub};">ventas</div></div>
      <div style="text-align:center;"><div style="font-size:14px;font-weight:700;color:#00b4d8;">${fmt(data.rev)}</div><div style="font-size:10px;color:${d.sub};">ingresos</div></div>
      <div style="text-align:center;"><div style="font-size:14px;font-weight:700;color:#00e5a0;">${fmt(data.profit)}</div><div style="font-size:10px;color:${d.sub};">ganancia</div></div>
    </div>`).join('')}
  </div>

  <!-- Gráfica 7 días -->
  <div style="${crd()}">
    <div style="color:${d.sub};font-size:12px;font-weight:700;margin-bottom:12px;">📈 Últimos 7 días</div>
    <div style="display:flex;align-items:flex-end;gap:6px;height:120px;">
      ${last7.map(day=>`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;">
        ${day.rev>0?`<div style="font-size:8px;color:#00e5a0;font-weight:700;">${fmt(day.profit)}</div>`:''}
        <div style="width:100%;display:flex;flex-direction:column;gap:2px;align-items:center;">
          <div style="width:75%;background:rgba(0,229,160,0.75);border-radius:4px 4px 0 0;min-height:${day.profit>0?3:0}px;height:${(day.profit/maxR)*90}px;"></div>
          <div style="width:75%;background:rgba(0,180,216,0.28);border-radius:0 0 4px 4px;min-height:${day.rev>0?3:0}px;height:${(day.rev/maxR)*90}px;"></div>
        </div>
        <div style="font-size:9px;color:${d.sub};text-align:center;">${day.label}</div>
      </div>`).join('')}
    </div>
    <div style="display:flex;gap:16px;margin-top:8px;font-size:11px;color:${d.sub};">
      <span><span style="color:rgba(0,229,160,0.8);">■</span> Ganancia</span>
      <span><span style="color:rgba(0,180,216,0.4);">■</span> Ingresos</span>
    </div>
  </div>

  <!-- Top 5 -->
  <div style="${crd()}">
    <div style="color:${d.sub};font-size:12px;font-weight:700;margin-bottom:12px;">🏆 Top 5 más vendidos</div>
    ${top5.filter(p=>p.sold>0).length===0?`<div style="color:${d.sub};font-size:13px;">Sin ventas en este periodo</div>`:
    top5.filter(p=>p.sold>0).map((p,i)=>`
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;padding-bottom:10px;border-bottom:${i<4?`1px solid ${d.brd}`:'none'};">
      <div style="width:30px;height:30px;background:${i===0?'#ffd700':i===1?'#c0c0c0':i===2?'#cd7f32':S.dark?'#1e1e30':'#eee'};border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;color:${i<3?'#000':d.sub};flex-shrink:0;">${i+1}</div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:14px;font-weight:600;color:${d.fg};">${p.name}</div>
        <div style="font-size:12px;color:${d.sub};">${p.sold} piezas vendidas</div>
      </div>
    </div>`).join('')}
  </div>

  <!-- Stock bajo -->
  ${ls2().length>0?`
  <div style="${crd()}background:rgba(255,165,0,0.06);border:1px solid rgba(255,165,0,0.25);">
    <div style="color:#ffa500;font-weight:700;margin-bottom:10px;font-size:13px;">⚠️ Productos con stock bajo</div>
    ${ls2().map(p=>`<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px;color:${d.sub};">
      <span>${p.name}</span><span style="color:${p.stock===0?'#ff6b6b':'#ffa500'};font-weight:600;">${p.stock===0?'AGOTADO':`${p.stock} pzas`}</span>
    </div>`).join('')}
  </div>`:''}`;
}

// ═══════════════════════════════════════════════════════════════
// MODALES COMPARTIDOS
// ═══════════════════════════════════════════════════════════════
function htmlModals(){
  const d=D();let h='';

  // Escáner
  if(S.scanner||S.scanForAdd){
    h+=`<div style="position:fixed;inset:0;background:rgba(0,0,0,0.96);z-index:3000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:20px;">
    <div style="color:#00e5a0;font-size:14px;text-align:center;font-weight:600;">📷 Apunta al código de barras</div>
    <div style="position:relative;width:300px;height:220px;border-radius:16px;overflow:hidden;border:2px solid #00e5a0;box-shadow:0 0 40px rgba(0,229,160,0.25);">
      <video id="sv" autoplay playsinline muted style="width:100%;height:100%;object-fit:cover;"></video>
      <div style="position:absolute;top:50%;left:0;right:0;height:2px;background:rgba(0,229,160,0.9);animation:scan 2s ease-in-out infinite;"></div>
    </div>
    <div style="display:flex;gap:8px;width:100%;max-width:360px;">
      <input id="sm" placeholder="O escribe el código aquí" autofocus
        onkeydown="if(event.key==='Enter'&&this.value.trim())SD(this.value.trim());"
        style="${inp_s()}flex:1;font-family:'DM Mono',monospace;font-size:16px;"/>
      <button onclick="SD(G('sm').value.trim())" class="btn-primary" style="padding:11px 20px;">OK</button>
    </div>
    <button onclick="CS()" style="padding:9px 28px;background:transparent;color:#666;border:1px solid #333;border-radius:8px;cursor:pointer;font-size:13px;">Cancelar</button>
    </div>`;
    setTimeout(()=>startScanner(SD),100);
  }

  // Recibo
  if(S.receipt){const r=S.receipt;const pm=PAYMENTS.find(m=>m.id===r.payMethod);
    h+=`<div style="position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;">
    <div style="background:${S.dark?'#111':d.bg};border:1px solid rgba(0,229,160,0.3);border-radius:22px;padding:26px;width:100%;max-width:380px;max-height:92vh;overflow-y:auto;">
      <div style="text-align:center;margin-bottom:16px;">
        <div style="font-size:48px;margin-bottom:8px;">✅</div>
        <div style="color:#00e5a0;font-weight:900;font-size:20px;">¡Venta completada!</div>
        <div style="color:${d.sub};font-size:12px;margin-top:3px;">${CFG.storeName} · ${S.cashier}</div>
      </div>
      <div style="border-top:1px dashed ${d.brd};border-bottom:1px dashed ${d.brd};padding:12px 0;margin:12px 0;">
        ${r.items.map(it=>`<div style="display:flex;justify-content:space-between;font-size:14px;margin-bottom:4px;">
          <span style="color:${d.sub};">${it.name} ×${it.qty}</span>
          <span style="color:${d.fg};">${fmt(it.price*it.qty)}</span>
        </div>`).join('')}
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;">
        <div style="display:flex;justify-content:space-between;font-weight:900;font-size:20px;color:${d.fg};"><span>Total</span><span style="color:#00e5a0;">${fmt(r.total)}</span></div>
        <div style="display:flex;justify-content:space-between;font-size:14px;"><span style="color:${d.sub};">Pago</span><span>${pm?.icon} ${pm?.label}</span></div>
        ${r.payMethod==='cash'?`<div style="display:flex;justify-content:space-between;font-size:14px;"><span style="color:${d.sub};">Pagó</span><span>${fmt(r.paid)}</span></div>
        ${r.change>0?`<div style="display:flex;justify-content:space-between;font-size:14px;"><span style="color:${d.sub};">Cambio</span><span style="color:#ffa500;font-weight:700;">${fmt(r.change)}</span></div>`:''}`:''} 
        <div style="background:rgba(0,229,160,0.08);border-radius:10px;padding:10px 14px;margin-top:4px;">
          <div style="display:flex;justify-content:space-between;font-size:14px;">
            <span style="color:${d.sub};">Tu ganancia</span>
            <span style="color:#00e5a0;font-weight:900;font-size:16px;">+${fmt(r.profit)}</span>
          </div>
        </div>
      </div>
      <div style="display:flex;gap:10px;margin-top:18px;">
        <button onclick="S.whatsModal=S.receipt;render()"
          style="${btn_s('#25D366','#fff')};flex:1;display:flex;align-items:center;justify-content:center;gap:6px;font-size:13px;padding:13px;">
          <span style="font-size:18px;">📲</span>WhatsApp
        </button>
        <button onclick="S.receipt=null;render()" class="btn-primary" style="flex:2;padding:13px;font-size:16px;">+ Nueva venta</button>
      </div>
    </div></div>`;
  }

  // WhatsApp
  if(S.whatsModal){
    h+=`<div style="position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:1100;display:flex;align-items:center;justify-content:center;padding:16px;">
    <div style="background:${S.dark?'#111':d.bg};border:1px solid rgba(37,211,102,0.35);border-radius:22px;padding:26px;width:100%;max-width:360px;">
      <div style="font-size:40px;text-align:center;margin-bottom:10px;">📲</div>
      <div style="font-weight:900;font-size:18px;color:${d.fg};text-align:center;margin-bottom:4px;">Enviar ticket por WhatsApp</div>
      <div style="color:${d.sub};font-size:12px;text-align:center;margin-bottom:18px;">El número <b style="color:#ff6b6b;">no queda guardado</b> en el sistema.</div>
      <div style="color:${d.sub};font-size:12px;margin-bottom:6px;">Número del cliente (10 dígitos)</div>
      <input id="wn" type="tel" maxlength="10" value="${S.whatsNum}"
        oninput="S.whatsNum=this.value.replace(/\\D/g,'').slice(0,10);this.value=S.whatsNum;"
        placeholder="5512345678"
        style="${inp_s()}font-family:'DM Mono',monospace;font-size:20px;letter-spacing:3px;text-align:center;margin-bottom:6px;"
        onkeydown="if(event.key==='Enter'&&S.whatsNum.length===10)sendWA(S.whatsModal,S.whatsNum)"/>
      <div style="color:${d.sub};font-size:11px;text-align:center;margin-bottom:16px;">Se agrega +52 automáticamente</div>
      <div style="display:flex;gap:10px;">
        <button onclick="S.whatsModal=null;S.whatsNum='';S.receipt=null;render()"
          style="${btn_s(S.dark?'#1e1e3a':'#f0f0f8',d.sub)};flex:1;padding:13px;">Omitir</button>
        <button onclick="if(S.whatsNum.length===10)sendWA(S.whatsModal,S.whatsNum);else notify('Ingresa 10 dígitos','err');"
          style="${btn_s('#25D366','#fff')};flex:2;display:flex;align-items:center;justify-content:center;gap:8px;padding:13px;">📲 Enviar</button>
      </div>
    </div></div>`;
  }

  // Cancelar venta
  if(S.cancelModal){const s=S.cancelModal;
    h+=`<div style="position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:1200;display:flex;align-items:center;justify-content:center;padding:16px;">
    <div style="background:${S.dark?'#111':d.bg};border:1px solid rgba(255,107,107,0.45);border-radius:22px;padding:26px;width:100%;max-width:400px;">
      <div style="text-align:center;margin-bottom:22px;">
        <div style="font-size:50px;margin-bottom:10px;">⛔</div>
        <div style="color:#ff6b6b;font-weight:900;font-size:20px;">Cancelar venta</div>
        <div style="color:${d.sub};font-size:13px;margin-top:4px;">Se requiere autorización del dueño</div>
      </div>
      <div style="background:${S.dark?'rgba(255,255,255,0.03)':'#f8f8f8'};border:1px solid ${d.brd};border-radius:12px;padding:14px;margin-bottom:18px;">
        ${s.items.map(it=>`<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px;color:${d.fg};">
          <span>${it.name} ×${it.qty}</span><span>${fmt(it.price*it.qty)}</span></div>`).join('')}
        <div style="border-top:1px solid ${d.brd};margin-top:8px;padding-top:8px;display:flex;justify-content:space-between;font-weight:700;">
          <span style="color:${d.fg};">Total</span><span style="color:#ff6b6b;font-size:16px;">${fmt(s.total)}</span>
        </div>
        <div style="font-size:11px;color:${d.sub};margin-top:4px;">${s.cashierName} · ${new Date(s.timestamp).toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'})}</div>
      </div>
      <div style="margin-bottom:14px;">
        <div style="color:${d.sub};font-size:12px;margin-bottom:6px;">Motivo *</div>
        <select id="cr" style="${inp_s()}">
          <option value="">Selecciona un motivo...</option>
          <option>Cliente desistió de la compra</option>
          <option>Pago con tarjeta rechazado</option>
          <option>Producto no disponible</option>
          <option>Error en el cobro</option>
          <option>Otro</option>
        </select>
      </div>
      <div style="margin-bottom:16px;">
        <div style="color:${d.sub};font-size:12px;margin-bottom:6px;">🔑 Contraseña del negocio (Caja 1) *</div>
        <input id="cp" type="password" placeholder="Ingresa la contraseña para autorizar"
          onkeydown="if(event.key==='Enter')CC()"
          style="${inp_s()}border:2px solid ${d.brd};font-size:16px;"/>
        <div id="ce" style="display:none;color:#ff6b6b;font-size:12px;margin-top:6px;"></div>
      </div>
      <div style="background:rgba(255,107,107,0.07);border:1px solid rgba(255,107,107,0.2);border-radius:10px;padding:10px 14px;margin-bottom:16px;font-size:13px;color:${S.dark?'#ff9999':'#cc4444'};">
        ⚠️ El inventario se restaurará automáticamente al cancelar.
      </div>
      <div style="display:flex;gap:10px;">
        <button onclick="S.cancelModal=null;render()" style="${btn_s(S.dark?'#1e1e3a':'#f0f0f8',d.sub)};flex:1;padding:13px;">Volver</button>
        <button onclick="CC()" style="${btn_s('#ff6b6b','#fff')};flex:2;padding:13px;font-size:15px;">⛔ Confirmar</button>
      </div>
    </div></div>`;
  }

  // Notificación
  if(S.notif){
    h+=`<div style="position:fixed;top:70px;left:50%;transform:translateX(-50%);background:${S.notif.type==='err'?'#ff6b6b':'#00e5a0'};color:#000;padding:10px 22px;border-radius:12px;font-weight:700;font-size:14px;z-index:9999;white-space:nowrap;box-shadow:0 6px 24px rgba(0,0,0,0.5);animation:fadeUp .2s ease;">
      ${S.notif.msg}
    </div>`;
  }
  return h;
}

// RENDER PRINCIPAL
// ═══════════════════════════════════════════════════════════════
function render(){
  const d=D();const root=G('root');
  document.body.style.background=d.bg;

  if(S.screen==='login'){root.innerHTML=rLogin()+htmlModals();return;}
  if(S.screen==='blocked'){root.innerHTML=rBlocked();return;}

  // Tab válido para el rol
  const tabs=isCaja1()?['sell','inv','rep']:['sell'];
  if(!tabs.includes(S.tab))S.tab='sell';

  const content=S.tab==='sell'?htmlSell():S.tab==='inv'?htmlInv():htmlRep();
  const ls=ls2();

  // ── MOBILE ──────────────────────────────────────────────
  const mobHtml=`
  <div class="mob-wrap" style="background:${d.bg};color:${d.fg};">
    <div class="mob-header" style="background:${d.hdr};border-bottom:1px solid ${d.brd};">
      <div>
        <div style="font-weight:900;font-size:14px;">${CFG.storeName}</div>
        <div style="font-size:10px;color:${d.sub};">${S.cashier}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        ${ls.length>0?`<div style="background:#ffa500;color:#000;font-size:10px;font-weight:800;padding:2px 7px;border-radius:20px;">⚠️${ls.length}</div>`:''}
        <div style="text-align:right;margin-right:2px;">
          <div style="color:#00e5a0;font-weight:800;font-size:13px;">${fmt(todayPrf())}</div>
          <div style="font-size:9px;color:${d.sub};">ganancia hoy</div>
        </div>
        <button onclick="S.dark=!S.dark;render()" style="background:${S.dark?'rgba(255,255,255,0.07)':'rgba(0,0,0,0.07)'};border:1px solid ${d.brd};color:${d.fg};border-radius:8px;padding:5px 9px;cursor:pointer;font-size:16px;">${S.dark?'☀️':'🌙'}</button>
        <button onclick="doLogout()" style="background:${S.dark?'rgba(255,255,255,0.04)':'rgba(0,0,0,0.04)'};border:1px solid ${d.brd};color:${d.sub};border-radius:8px;padding:5px 9px;cursor:pointer;font-size:12px;">Salir</button>
      </div>
    </div>
    <div class="mob-content">${content}</div>
    <div class="mob-nav" style="background:${d.nav};border-top:1px solid ${d.brd};">
      <button onclick="ST('sell')" style="flex:1;padding:11px 4px;background:none;border:none;color:${S.tab==='sell'?'#00e5a0':d.sub};font-size:10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-weight:${S.tab==='sell'?700:400};border-top:${S.tab==='sell'?'2px solid #00e5a0':'2px solid transparent'};font-family:'DM Sans',sans-serif;"><span style="font-size:22px;">🏪</span>Vender</button>
      ${isCaja1()?`
      <button onclick="ST('inv')" style="flex:1;padding:11px 4px;background:none;border:none;color:${S.tab==='inv'?'#00e5a0':d.sub};font-size:10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-weight:${S.tab==='inv'?700:400};border-top:${S.tab==='inv'?'2px solid #00e5a0':'2px solid transparent'};font-family:'DM Sans',sans-serif;"><span style="font-size:22px;">📦</span>Inventario</button>
      <button onclick="ST('rep')" style="flex:1;padding:11px 4px;background:none;border:none;color:${S.tab==='rep'?'#00e5a0':d.sub};font-size:10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-weight:${S.tab==='rep'?700:400};border-top:${S.tab==='rep'?'2px solid #00e5a0':'2px solid transparent'};font-family:'DM Sans',sans-serif;"><span style="font-size:22px;">📊</span>Reportes</button>
      `:''}
    </div>
  </div>`;

  // ── PC/LAPTOP ────────────────────────────────────────────
  const pcHtml=`
  <div class="pc-wrap" style="background:${d.bg};color:${d.fg};">
    <!-- Sidebar -->
    <div class="pc-sidebar" style="background:${d.sidebar};border-right:1px solid ${d.brd};">
      <div style="padding:20px 20px 16px;">
        <div style="width:48px;height:48px;background:linear-gradient(135deg,#00e5a0,#00b4d8);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:12px;">🏪</div>
        <div style="font-weight:900;font-size:14px;color:${d.fg};line-height:1.2;">${CFG.storeName}</div>
        <div style="font-size:11px;color:${d.sub};margin-top:3px;">${S.cashier}</div>
      </div>
      <div style="padding:0 12px;flex:1;">
        <button onclick="ST('sell')" style="width:100%;padding:12px 14px;border:none;border-radius:10px;background:${S.tab==='sell'?(S.dark?'rgba(0,229,160,0.12)':'rgba(0,180,130,0.1)'):'transparent'};color:${S.tab==='sell'?'#00e5a0':d.sub};cursor:pointer;display:flex;align-items:center;gap:10px;font-size:14px;font-weight:${S.tab==='sell'?700:500};margin-bottom:4px;font-family:'DM Sans',sans-serif;text-align:left;">
          <span style="font-size:20px;">🏪</span> Vender
        </button>
        ${isCaja1()?`
        <button onclick="ST('inv')" style="width:100%;padding:12px 14px;border:none;border-radius:10px;background:${S.tab==='inv'?(S.dark?'rgba(0,229,160,0.12)':'rgba(0,180,130,0.1)'):'transparent'};color:${S.tab==='inv'?'#00e5a0':d.sub};cursor:pointer;display:flex;align-items:center;gap:10px;font-size:14px;font-weight:${S.tab==='inv'?700:500};margin-bottom:4px;font-family:'DM Sans',sans-serif;text-align:left;">
          <span style="font-size:20px;">📦</span> Inventario
        </button>
        <button onclick="ST('rep')" style="width:100%;padding:12px 14px;border:none;border-radius:10px;background:${S.tab==='rep'?(S.dark?'rgba(0,229,160,0.12)':'rgba(0,180,130,0.1)'):'transparent'};color:${S.tab==='rep'?'#00e5a0':d.sub};cursor:pointer;display:flex;align-items:center;gap:10px;font-size:14px;font-weight:${S.tab==='rep'?700:500};margin-bottom:4px;font-family:'DM Sans',sans-serif;text-align:left;">
          <span style="font-size:20px;">📊</span> Reportes
        </button>`:''}
      </div>
      <!-- Sidebar bottom -->
      <div style="padding:16px 20px;border-top:1px solid ${d.brd};">
        ${ls.length>0?`<div style="background:rgba(255,165,0,0.1);border:1px solid rgba(255,165,0,0.25);border-radius:8px;padding:8px 12px;margin-bottom:10px;">
          <div style="color:#ffa500;font-size:12px;font-weight:700;">⚠️ ${ls.length} stock bajo</div>
        </div>`:''}
        <div style="margin-bottom:10px;">
          <div style="color:#00e5a0;font-weight:900;font-size:18px;">${fmt(todayPrf())}</div>
          <div style="font-size:10px;color:${d.sub};">ganancia hoy</div>
        </div>
        <div style="display:flex;gap:6px;">
          <button onclick="S.dark=!S.dark;render()" style="flex:1;padding:8px;background:${S.dark?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.05)'};border:1px solid ${d.brd};color:${d.fg};border-radius:8px;cursor:pointer;font-size:15px;">${S.dark?'☀️':'🌙'}</button>
          <button onclick="doLogout()" style="flex:2;padding:8px;background:transparent;border:1px solid ${d.brd};color:${d.sub};border-radius:8px;cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;">Salir</button>
        </div>
      </div>
    </div>
    <!-- Main content -->
    <div class="pc-main">
      <div class="pc-topbar" style="background:${d.hdr};border-bottom:1px solid ${d.brd};">
        <div style="font-weight:700;font-size:18px;color:${d.fg};">
          ${{sell:'Vender',inv:'Inventario',rep:'Reportes'}[S.tab]}
        </div>
        <div style="display:flex;align-items:center;gap:12px;">
          <div style="font-size:12px;color:${d.sub};">${new Date().toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long'})}</div>
        </div>
      </div>
      <div class="pc-content" style="max-width:900px;">${content}</div>
    </div>
  </div>`;

  root.innerHTML = mobHtml + pcHtml + htmlModals();
}

// ── Actualizar resultados de búsqueda sin re-render completo ──
function renderSearchResults(){
  const d=D();
  const resultsEl=G('search-results');
  if(!resultsEl)return;
  const q=S.searchQ;
  if(!q){resultsEl.innerHTML='';return;}
  const results=S.prods.filter(p=>p.name.toLowerCase().includes(q.toLowerCase())).slice(0,8);
  resultsEl.innerHTML=results.map(p=>`
  <div onclick="addByBarcode('${p.barcode}');S.searchQ='';G('search-real').value='';G('search-results').innerHTML='';"
    style="padding:10px 12px;border-radius:9px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;"
    onmouseover="this.style.background='${d.hvr}'" onmouseout="this.style.background='transparent'">
    <div>
      <div style="font-size:14px;font-weight:600;color:${d.fg};">${p.name}</div>
      <div style="font-size:11px;color:${d.sub};">Stock: ${p.stock} · ${p.cat}</div>
    </div>
    <div style="color:#00e5a0;font-weight:700;font-size:15px;">${fmt(p.price)}</div>
  </div>`).join('');
}

// Actualizar margen en modal agregar
function UNP(){
  const cost=parseFloat(S.newP.cost)||0,price=parseFloat(S.newP.price)||0;
  const el=G('np-margin');
  if(!el)return;
  if(cost>0&&price>0){
    const margin=price-cost;const pct=((margin/cost)*100).toFixed(0);
    el.style.display='block';
    el.innerHTML=`Ganancia por pieza: <b style="color:#00e5a0;">${fmt(margin)} (${pct}%)</b>`;
  } else el.style.display='none';
}

// ═══════════════════════════════════════════════════════════════
// HANDLERS GLOBALES
// ═══════════════════════════════════════════════════════════════
window.ST=t=>{S.tab=t;S.searchQ='';render();};
window.doLogout=doLogout;
window.doLogin1=doLogin1;window.doLoginPin=doLoginPin;
window.addByBarcode=addByBarcode;window.finalizeSale=finalizeSale;
window.filterPeriod=filterPeriod;window.printReport=printReport;
window.sendWA=sendWA;window.G=G;window.S=S;

window.CQ=(b,delta)=>{
  const p=S.prods.find(p=>p.barcode===b);
  S.cart=S.cart.map(c=>{
    if(c.barcode!==b)return c;
    const nq=c.qty+delta;
    if(nq<1)return c;
    if(nq>p?.stock){notify('Sin suficiente existencia','err');return c;}
    return{...c,qty:nq};
  });render();
};
window.RC=b=>{S.cart=S.cart.filter(c=>c.barcode!==b);render();};
window.US=(b,v)=>{
  S.prods=S.prods.map(p=>p.barcode===b?{...p,stock:parseInt(v)||0}:p);
  setProds(S.prods);notify('✓ Stock actualizado');
};
window.OA=()=>{S.addModal=true;S.newP={barcode:'',name:'',cat:'',cost:'',price:'',stock:'',min:'5'};render();};
window.SNP=()=>{
  const p=S.newP;
  if(!p.barcode||!p.name){notify('Código y nombre requeridos','err');return;}
  if(S.prods.find(pr=>pr.barcode===p.barcode)){notify('Ese código ya existe','err');return;}
  S.prods=[...S.prods,{...p,cost:+p.cost,price:+p.price,stock:+p.stock,min:+p.min||5}];
  setProds(S.prods);S.addModal=false;notify('✓ Producto agregado');render();
};
window.UNP=UNP;
window.renderSearchResults=renderSearchResults;
window.SD=code=>{
  stopScanner();
  if(S.scanForAdd){S.newP.barcode=code;S.scanForAdd=false;notify('✓ Código escaneado: '+code);}
  else{addByBarcode(code);S.scanner=false;}
  render();
};
window.CS=()=>{stopScanner();S.scanner=false;S.scanForAdd=false;render();};
window.CC=()=>{
  const reason=G('cr')?.value,pass=G('cp')?.value,errEl=G('ce');
  if(!reason){if(errEl){errEl.style.display='block';errEl.textContent='Selecciona un motivo.';}return;}
  if(pass!==CFG.password){if(errEl){errEl.style.display='block';errEl.textContent='Contraseña incorrecta.';}return;}
  cancelSale(S.cancelModal,reason);render();
};

// ── Teclado global ────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(S.screen!=='pos')return;
  // Tab / Shift+Tab para navegar entre campos
  // Esc cierra modales
  if(e.key==='Escape'){
    if(S.scanner||S.scanForAdd){CS();return;}
    if(S.receipt){S.receipt=null;render();return;}
    if(S.whatsModal){S.whatsModal=null;S.whatsNum='';render();return;}
    if(S.cancelModal){S.cancelModal=null;render();return;}
    if(S.addModal){S.addModal=false;render();return;}
  }
  // F2 = ir a vender
  if(e.key==='F2'){e.preventDefault();ST('sell');}
  // F3 = inventario (solo Caja 1)
  if(e.key==='F3'&&isCaja1()){e.preventDefault();ST('inv');}
  // F4 = reportes (solo Caja 1)
  if(e.key==='F4'&&isCaja1()){e.preventDefault();ST('rep');}
  // Enter en código de barras ya lo maneja el input
});

// ── Init ──────────────────────────────────────────────────────
S.prods=getProds();S.sales=getSales();
render();
</script>
